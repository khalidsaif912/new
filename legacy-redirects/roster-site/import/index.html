<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Import Duty Roster</title>
  <link rel="canonical" href="https://khalidsaif912.github.io/new/docs/import/">
  <meta http-equiv="refresh" content="0; url=https://khalidsaif912.github.io/new/docs/import/">
  <script>
  (function () {
    var canonicalBase = 'https://khalidsaif912.github.io/new/docs/import/';
    var legacyPrefix = '/roster-site/import/';
    var path = location.pathname || '';
    var rest = '';
    var idx = path.indexOf(legacyPrefix);
    if (idx >= 0) rest = path.slice(idx + legacyPrefix.length);
    rest = rest.replace(/^\//, '');
    if (rest === 'index.html') rest = '';
    var target = canonicalBase + rest;
    if (rest && !/\.[a-z0-9]+$/i.test(rest) && target.charAt(target.length - 1) !== '/') target += '/';
    location.replace(target + location.search + location.hash);
  })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:40px;">جاري التوجيه...</p>
</body>
</html>
