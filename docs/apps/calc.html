<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2196F3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>حساب الكميات</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #1976D2;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
    }
    .calc-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }
    .calc-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      padding: calc(6px + env(safe-area-inset-top, 0px)) 10px 6px;
      background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
      color: #fff;
    }
    .calc-back,
    .calc-refresh {
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .calc-back {
      min-height: 36px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 700;
    }
    .calc-refresh {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    .calc-refresh:active {
      transform: scale(0.94);
      background: rgba(255, 255, 255, 0.28);
    }
    .calc-refresh.spinning {
      animation: calcRefreshSpin 0.7s linear;
    }
    @keyframes calcRefreshSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .calc-title {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      margin: 0;
    }
    .calc-frame-wrap {
      flex: 1;
      min-height: 0;
      background: #fff;
    }
    #calcFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="calc-shell">
    <div class="calc-top">
      <button type="button" class="calc-back" id="calcBackBtn" aria-label="رجوع">← رجوع</button>
      <h1 class="calc-title">📦 حساب الكميات</h1>
      <button type="button" class="calc-refresh" id="calcRefreshBtn" aria-label="تحديث" title="تحديث">↻</button>
    </div>
    <div class="calc-frame-wrap">
      <iframe
        id="calcFrame"
        title="حساب الكميات"
        allow="clipboard-read; clipboard-write"
        src="https://iammrk-8af39.web.app/calculator/index.html?from=roster&amp;embed=1&amp;v=20260630"
      ></iframe>
    </div>
  </div>
  <script>
    (function () {
      var CALC_SRC = 'https://iammrk-8af39.web.app/calculator/index.html?from=roster&embed=1&v=20260630';

      function siteRoot() {
        if (location.protocol === 'file:') return '';
        var path = location.pathname || '/';
        if (path.indexOf('/roster-site/') !== -1) return '/roster-site';
        if (location.hostname && location.hostname.endsWith('github.io')) {
          var segs = path.split('/').filter(Boolean);
          if (segs.length >= 2 && segs[1] === 'docs') return '/' + segs[0] + '/docs';
          return segs.length ? '/' + segs[0] : '';
        }
        return '';
      }

      document.getElementById('calcBackBtn').addEventListener('click', function () {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        var root = siteRoot();
        var home = location.origin + root + (root && root.charAt(root.length - 1) !== '/' ? '/' : '/');
        location.href = home;
      });

      document.getElementById('calcRefreshBtn').addEventListener('click', function () {
        var btn = this;
        var frame = document.getElementById('calcFrame');
        if (!frame) return;
        btn.classList.add('spinning');
        frame.src = CALC_SRC + '&_=' + Date.now();
        setTimeout(function () {
          btn.classList.remove('spinning');
        }, 700);
      });
    })();
  </script>
</body>
</html>
