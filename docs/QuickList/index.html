<html lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>سجل مشتريات المنزل 🛒️</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196F3">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- CSS Variables --- */
    :root {
      --primary-color: #2196F3;
      --secondary-color: #1976D2;
      --accent-color: #42a5f5;
      --danger-color: #d32f2f;
      --danger-bg-color: #ffebee;
      --success-color: #4CAF50;
      --info-color: #1976D2;
      --info-bg-color: #E3F2FD;

      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --header-gradient: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
      --button-gradient: linear-gradient(180deg, #42a5f5 0%, #1e88e5 50%, #1565c0 100%);
      --button-hover-gradient: linear-gradient(180deg, #4fc3f7 0%, #1e88e5 52%, #1565c0 100%);

      --text-dark: #212121;
      --text-light: #ffffff;
      --text-muted: #9e9e9e;
      --text-on-primary: #ffffff;
      --text-on-secondary: #ffffff;

      --border-radius-sm: 8px;
      --border-radius-md: 12px;
      --border-radius-lg: 16px;
      --border-color: #e0e0e0;

      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);

      --font-family: 'Tajawal', Arial, sans-serif;
      --font-size-sm: 0.875rem; /* 14px */
      --font-size-md: 1rem;     /* 16px */
      --font-size-lg: 1.125rem; /* 18px */
    }

    /* --- General Styles & Reset --- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

body {
  font-family: var(--font-family);
  color: var(--text-dark);
  background: var(--bg-gradient);
  min-height: 100%;
  min-height: 100dvh;
  direction: rtl;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}



    button, input, textarea {
      font-family: inherit;
      border: none;
    }

    /* --- Header --- */
    .header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 1000;
      min-height: calc(58px + env(safe-area-inset-top, 0px));
      padding: 12px 14px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      padding-left: calc(14px + env(safe-area-inset-left, 0px));
      padding-right: calc(14px + env(safe-area-inset-right, 0px));
      background: var(--header-gradient);
      color: var(--text-light);
      box-shadow: 0 2px 10px rgba(21, 101, 192, 0.22);
    }

    .header-home-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, background 0.2s ease;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      justify-self: end;
    }

    .header-home-btn img {
      width: 22px;
      height: 22px;
      display: block;
      pointer-events: none;
    }

    .header-home-btn:hover {
      background: rgba(0, 0, 0, 0.32);
    }

    .header-home-btn:active {
      transform: scale(0.92);
    }

    .header .icon {
      font-size: 1.65rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
      justify-self: start;
    }

    #datetime {
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0.96;
      text-align: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

main.container {
  margin: 0.75rem auto;
  padding: 0 0 1rem;
  max-width: 634px;
  width: calc(100% - 1rem);
  background: #fff;
  border-radius: var(--border-radius-lg);
  box-shadow: 0 4px 18px rgba(21, 101, 192, 0.12);
  overflow: hidden;
}

    /* --- Tabs (folder style) --- */
    .tabs-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 10px 8px 0;
      background: linear-gradient(180deg, #eef2f7 0%, #e3e9f2 100%);
      border-bottom: 1px solid #c5d0de;
    }

    .tabs-nav {
      display: flex;
      align-items: flex-end;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0;
      padding: 0 2px;
      scroll-padding-inline: 12px;
      scroll-snap-type: x proximity;
    }

    .tabs-nav::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      position: relative;
      flex-shrink: 0;
      scroll-snap-align: start;
      margin-inline-end: -10px;
      padding: 8px 20px 10px;
      min-height: 36px;
      max-width: 132px;
      border: 1px solid #b7c8dc;
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(180deg, #e2ebf5 0%, #d2ddea 100%);
      color: #47627d;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: inherit;
      line-height: 1.15;
      transform: translateY(5px);
      box-shadow: 1px -1px 0 rgba(255, 255, 255, 0.65) inset, 2px -3px 8px rgba(15, 40, 80, 0.08);
      transition: transform 0.2s ease, padding 0.2s ease, font-size 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, z-index 0s;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.tab-tone-0:not(.active) {
      background: linear-gradient(180deg, #dfe9f4 0%, #cfd9e6 100%);
      color: #4a6278;
    }

    .tab-btn.tab-tone-1:not(.active) {
      background: linear-gradient(180deg, #d4e8f8 0%, #bdd9f2 100%);
      color: #3f6586;
    }

    .tab-btn.tab-tone-2:not(.active) {
      background: linear-gradient(180deg, #c8e4f9 0%, #aed3f3 100%);
      color: #356789;
    }

    .tab-btn.tab-tone-3:not(.active) {
      background: linear-gradient(180deg, #b9ddf8 0%, #9ecbf0 100%);
      color: #2f6085;
    }

    .tab-btn.tab-tone-4:not(.active) {
      background: linear-gradient(180deg, #a8d5f6 0%, #8ec2eb 100%);
      color: #285b7f;
    }

    .tab-btn.active {
      z-index: 6;
      margin-inline-end: -6px;
      min-height: 42px;
      padding: 10px 24px 12px;
      max-width: 160px;
      font-size: 0.9rem;
      color: #fff;
      border-color: #1565c0;
      transform: translateY(0);
      background: linear-gradient(180deg, #64b5f6 0%, #2196f3 48%, #1565c0 100%);
      box-shadow: 0 -4px 14px rgba(21, 101, 192, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .tab-add-btn {
      flex-shrink: 0;
      align-self: flex-end;
      width: 38px;
      height: 38px;
      margin-bottom: 2px;
      margin-inline-start: 4px;
      border: 1px solid #b7c8dc;
      border-radius: 10px 10px 0 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc 0%, #e8eef5 100%);
      color: #1976d2;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: 1px -2px 6px rgba(15, 40, 80, 0.08);
      transition: background 0.2s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-add-btn:hover {
      background: linear-gradient(180deg, #e3f2fd 0%, #d6e9fa 100%);
    }

    .tab-add-btn:active {
      transform: scale(0.94);
    }

    .container-body {
      padding: 1rem;
      background: #fff;
      border-top: 2px solid #1565c0;
    }

    .entry-panel {
      padding: 0.85rem;
      margin-bottom: 1rem;
      border: 1px solid #dbe7f5;
      border-radius: 12px;
      background: linear-gradient(180deg, #fbfdff 0%, #f4f9ff 100%);
    }

    .entry-panel .main-button {
      margin-bottom: 0;
    }

    .section-title {
      display: none;
    }
    
    /* --- Forms & Buttons --- */
    textarea#inputList {
      display: block;
      width: 100%;
      min-height: 80px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: var(--font-size-lg);
      text-align: center;
      background: #f8fbff;
      border: 2px solid #90caf9;
      border-radius: var(--border-radius-md);
      box-shadow: 0 2px 8px rgba(21, 101, 192, 0.08);
      transition: border-color 0.2s, box-shadow 0.3s;
      -webkit-user-select: text;
      user-select: text;
    }

    textarea#inputList:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.16);
      outline: none;
    }

.main-button {
  display: block;
  width: 100%;
  min-height: 44px;
  padding: 10px 16px;
  margin-bottom: 1.25rem;
  font-size: 0.94rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: #fff;
  background: var(--button-gradient);
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(21, 101, 192, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.24);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.main-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(21, 101, 192, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.28);
}

.main-button:active {
  transform: translateY(0) scale(0.99);
  box-shadow: 0 2px 8px rgba(21, 101, 192, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.18);
}

    /* --- Purchase History --- */
    .history-title {
        font-size: 1.2rem;
        margin-bottom: 0.75rem;
    }

    #purchaseHistory > p {
      text-align: center;
      color: var(--text-muted);
      padding: 1.5rem 0.5rem;
      font-size: var(--font-size-md);
    }
    .purchase-list {
      margin-bottom: 0.75rem;
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      border: 1px solid #dbe7f5;
      box-shadow: 0 2px 10px rgba(21, 101, 192, 0.1);
    }


    .purchase-list.over {
    border-color: var(--danger-color);
    }
    .purchase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      font-size: var(--font-size-md);
      font-weight: 700;
      user-select: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .purchase-list:nth-child(odd) .purchase-header { background: #e3f2fd; color: #1565c0; }
    .purchase-list:nth-child(even) .purchase-header { background: #f1f5f9; color: #1976d2; }
    .purchase-header.over {
      background: var(--danger-bg-color) !important;
      color: var(--danger-color);
    }
    .ph-date { font-weight: 800; font-size: 1.1rem; }
    .ph-budget { display: flex; align-items: center; gap: 0.5rem; }
    .budget-input {
      width: 70px;
      padding: 4px 6px;
      direction: ltr;
      border: 1px solid #ccc;
      border-radius: var(--border-radius-sm);
      transition: border-color 0.2s;
    }
    .budget-input:focus { border-color: var(--accent-color); outline: none; }
    .purchase-list.closed .ph-budget { display: none; }
    .ph-total { font-weight: 800; font-size: var(--font-size-lg); }
    .purchase-list.closed .ph-total { display: block; }
    .purchase-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      padding: 0 0.5rem;
    }
    .purchase-list:nth-child(odd) .purchase-content { background: #f8fbff; }
    .purchase-list:nth-child(even) .purchase-content { background: #fafcff; }
    .purchase-content.open { max-height: 1500px; padding: 0.5rem; }

    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      margin: 0 -0.15rem;
    }

    .table-scroll-wrap table {
      min-width: 300px;
    }

    /* --- Purchase Table --- */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 0.6rem 0.5rem;
      text-align: center;
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--border-color);
    }
    th {
      font-weight: 700;
      background: #e0f2f1;
      color: var(--secondary-color);
    }
    tbody tr { cursor: pointer; transition: background-color 0.15s ease; }
    tbody tr:not(.checked):hover { background-color: #f0f8ff; }
    tr.checked { color: var(--text-muted); background: #f5f5f5; }
    tr.checked .col-item { text-decoration: line-through; }
    .col-item { font-weight: 500; word-break: break-word; }
    .delete-btn {
      color: var(--danger-color);
      font-weight: bold;
      font-size: 1.5rem;
      user-select: none;
      transition: color 0.2s, transform 0.2s;
    }
    .delete-btn:hover { color: #c0392b; transform: scale(1.2); }
    .quantity-input, .price-input {
      width: 50px;
      padding: 4px;
      font-size: var(--font-size-sm);
      text-align: center;
      background: #fffde7;
      border: 1px solid #ccc;
      border-radius: var(--border-radius-sm);
    }
    .quantity-input:focus, .price-input:focus {
      outline: 2px solid var(--accent-color);
      border-color: var(--accent-color);
    }
    .total-row-table td {
      padding: 0.75rem;
      font-weight: 800;
      font-size: var(--font-size-md);
      background: #e0f7fa !important;
      color: var(--secondary-color);
      border-bottom: none;
    }
    .total-row-table td.over {
      background: var(--danger-bg-color) !important;
      color: var(--danger-color);
    }
    .total-actions { display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
    .total-input {
      width: 75px;
      padding: 4px;
      font-size: var(--font-size-md);
      font-weight: bold;
      text-align: center;
      color: var(--secondary-color);
      background: var(--text-light);
      border: 1px solid var(--primary-color);
      border-radius: var(--border-radius-sm);
      transition: all 0.3s ease;
    }
    .total-input.edited {
      border-color: var(--info-color);
      background: var(--info-bg-color);
      box-shadow: 0 2px 8px rgba(100, 181, 246, 0.3);
    }
    .total-edited-mark {
      font-size: 0.7rem;
      font-weight: bold;
      color: var(--info-color);
      background: var(--info-bg-color);
      padding: 2px 4px;
      border-radius: 4px;
      display: none;
    }

    /* --- Notes Section --- */
    .notes-btn {
      display: block;
      margin: 1rem auto 0.5rem;
      padding: 0.5rem 1rem;
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--text-dark);
      background-color: var(--accent-color);
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .notes-btn:hover { background-color: #ffb300; }
    .notes-display {
        padding: 0.75rem;
        margin-top: 0.5rem;
        background: #fffde7;
        border: 1px solid #ffd54f;
        border-radius: var(--border-radius-sm);
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    /* --- Modals & Toasts --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 3000;
      inset: 0;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    }
    .modal.show { display: flex; }
    .modal-content {
      width: 90vw;
      max-width: 340px;
      padding: 1.5rem;
      text-align: center;
      background: var(--text-light);
      border-radius: var(--border-radius-lg);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transform: scale(0.95);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    }
    .modal.show .modal-content { transform: scale(1); opacity: 1; }
    .modal-content h3 { margin: 0 0 1rem; font-size: 1.2rem; }
    .modal-buttons { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; }
    .modal-button {
        padding: 0.6rem 1.25rem;
        font-size: var(--font-size-md);
        font-weight: 700;
        border-radius: var(--border-radius-sm);
        cursor: pointer;
        transition: opacity 0.2s;
        min-height: 44px;
    }
    .modal-button:hover { opacity: 0.85; }
    .modal-button.confirm { background-color: var(--danger-color); color: var(--text-light); }
    .modal-button.confirm-add { background-color: var(--primary-color); color: var(--text-light); }
    .modal-button.cancel { background-color: #eee; color: var(--text-dark); }

    #addTabDialog input, #notesModalTextarea {
        width: 100%;
        padding: 0.75rem;
        font-size: var(--font-size-md);
        border: 1.5px solid var(--border-color);
        border-radius: var(--border-radius-sm);
        background: #f8f8ff;
        transition: border-color 0.2s;
    }
    #addTabDialog input:focus, #notesModalTextarea:focus {
        border-color: var(--primary-color);
        outline: none;
    }
    #notesModalTextarea {
        min-height: 120px;
        resize: vertical;
    }
    
    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      padding: 1rem 1.5rem;
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--text-light);
      border-radius: var(--border-radius-lg);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      z-index: 4000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
    }
    #budgetToast { background: rgba(211, 47, 47, 0.95); }
    #correctionToast 
    { background: linear-gradient(135deg, rgba(3, 192, 250, 0.8), rgba(235, 240, 235, 0.8)
    ); }

    /* --- Footer removed --- */

    /* --- Animations --- */
.shake { animation: shake 0.4s; }
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(4px); }
  30%, 50%, 70% { transform: translateX(-8px); }
  40%, 60% { transform: translateX(8px); }
}
.row-glow { animation: rowGlow 0.6s; }
@keyframes rowGlow {
  from { background-color: #fff3cd; }
  to { background-color: inherit; }
}

/* --- Tablet & Mobile --- */
@media (max-width: 768px) {
  main.container {
    margin: 0.5rem auto;
    border-radius: var(--border-radius-md);
  }

  .container-body {
    padding: 0.85rem;
  }

  .entry-panel {
    padding: 0.75rem;
  }

  .history-title {
    font-size: 1.05rem;
  }
}

@media (max-width: 520px) {
  body {
    background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%);
    overscroll-behavior-y: contain;
  }

  .header {
    min-height: calc(60px + env(safe-area-inset-top, 0px));
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
  }

  .header-home-btn {
    width: 38px;
    height: 38px;
  }

  .tab-btn {
    max-width: 108px;
    padding: 7px 16px 9px;
    font-size: 0.74rem;
    margin-inline-end: -8px;
  }

  .tab-btn.active {
    max-width: 128px;
    min-height: 40px;
    padding: 9px 18px 11px;
    font-size: 0.84rem;
  }

  .tab-add-btn {
    width: 34px;
    height: 34px;
    font-size: 1.1rem;
  }

  .header .icon {
    font-size: 1.6rem;
  }

  #datetime {
    font-size: 0.82rem;
    line-height: 1.35;
  }

  main.container {
    margin: 0.4rem;
    max-width: calc(100vw - 0.8rem);
    width: auto;
    border-radius: 14px;
  }

  .container-body {
    padding: 0.75rem;
    padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
  }

  .entry-panel {
    padding: 0.7rem;
    margin-bottom: 0.85rem;
  }

  textarea#inputList {
    font-size: 16px;
    min-height: 88px;
    padding: 0.75rem;
    border-radius: 10px;
  }

  .main-button {
    font-size: var(--font-size-md);
    min-height: 44px;
    padding: 10px 16px;
    border-radius: 12px;
  }

  .tab-add-btn {
    width: 34px;
    height: 34px;

const parseInputToItems = (input) => {
  const lines = input
    .split(/[\n\r]+/)             // تقسيم على الأسطر
    .map(line => line.trim())
    .filter(line => line);

  const items = new Set();

  lines.forEach(line => {
    let cleanLine = line;

    // إزالة تنسيقات الواتساب
    cleanLine = cleanLine.replace(/^\[.+?\]\s*/, "");     // التوقيت
    cleanLine = cleanLine.replace(/^[^:]+:\s*/, "");      // أسماء المرسلين
    cleanLine = cleanLine.replace(/^[\d\-•\*\+\s]*/, ""); // أرقام أو رموز في البداية

    // إزالة الإيموجي والرموز
    cleanLine = cleanLine.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, "");
    cleanLine = cleanLine.trim();

    if (cleanLine) {
      const subItems = cleanLine
        .split(/\s+و\s+|[,،\-|/]+/)        // أولاً يفصل عند كلمة "و" أو الفواصل
        .flatMap(item => item.trim().split(/\s+/)) // ثم يفصل عند المسافات
        .map(item => item.trim())
        .filter(item => item);

      subItems.forEach(item => items.add(item));
    }
  });

  return Array.from(items);
};

const day = String(now.getDate()).padStart(2, '0');
const month = String(now.getMonth() + 1).padStart(2, '0');
const year = now.getFullYear();
const today = `${year}/${month}/${day}`;
            
            let todayPurchase = state.tabs[state.currentTab].lists.find(p => p.date === today);
            if (!todayPurchase) {
                todayPurchase = { date: today, items: [], notes: '', open: true, budget: "" };
                state.tabs[state.currentTab].lists.unshift(todayPurchase);
            }

            items.forEach(itemName => {
                if (!todayPurchase.items.some(i => i.item === itemName)) {
                    todayPurchase.items.push({ item: itemName, quantity: '', price: '', checked: false });
                }
            });

            saveState();
            DOMElements.inputList.value = '';
            render();
        };

        const handleHistoryClick = (e) => {
            const listDiv = e.target.closest('.purchase-list');
            if (!listDiv) return;
            const listIndex = parseInt(listDiv.dataset.listIndex);
            const purchase = state.tabs[state.currentTab].lists[listIndex];
            
            // Toggle list open/close
            if (e.target.closest('.purchase-header') && !e.target.matches('.budget-input')) {
                purchase.open = !purchase.open;
                saveState();
                render();
            }
            
            // Delete item
            if (e.target.classList.contains('delete-btn')) {
                const itemIndex = parseInt(e.target.closest('tr').dataset.itemIndex);
                purchase.items.splice(itemIndex, 1);
                saveState();
                render();
            }

            // Show notes
            if (e.target.classList.contains('notes-btn')) {
                DOMElements.notesModalTextarea.value = purchase.notes || '';
                DOMElements.notesModal.dataset.listIndex = listIndex;
                showModal(DOMElements.notesModal);
            }

            // Check item
            if (e.target.type === 'checkbox') {
                 const itemIndex = parseInt(e.target.closest('tr').dataset.itemIndex);
                 purchase.items[itemIndex].checked = e.target.checked;
                 saveState();
                 render();
            }
        };

        const handleHistoryChange = (e) => {
            const listDiv = e.target.closest('.purchase-list');
            if (!listDiv) return;
            const listIndex = parseInt(listDiv.dataset.listIndex);
            const purchase = state.tabs[state.currentTab].lists[listIndex];
            const originalTotal = purchase.items.reduce((sum, it) => sum + (parseFloat(it.price) || 0) * (parseInt(it.quantity) || 1), 0);

            // Update budget, quantity, price, or manual total
            if (e.target.classList.contains('budget-input')) {
                purchase.budget = e.target.value;
            } else if (e.target.classList.contains('quantity-input')) {
                const itemIndex = parseInt(e.target.closest('tr').dataset.itemIndex);
                purchase.items[itemIndex].quantity = e.target.value;
            } else if (e.target.classList.contains('price-input')) {
                const itemIndex = parseInt(e.target.closest('tr').dataset.itemIndex);
                purchase.items[itemIndex].price = e.target.value;
            } else if (e.target.classList.contains('total-input')) {
                if (parseFloat(e.target.value).toFixed(2) !== originalTotal.toFixed(2)) {
                    purchase.manualTotal = e.target.value;
                } else {
                    delete purchase.manualTotal;
                }
            }
            saveState();
            render();
        };

const handleHistoryDblClick = (e) => {
    e.preventDefault(); // 🚫 يمنع الحركة الافتراضية في الهاتف

    const tr = e.target.closest('tbody tr');
    if (tr && !e.target.matches('input, .delete-btn')) {
        const listIndex = parseInt(tr.closest('.purchase-list').dataset.listIndex);
        const itemIndex = parseInt(tr.dataset.itemIndex);
        const item = state.tabs[state.currentTab].lists[listIndex].items[itemIndex];
        item.quantity = '';
        item.price = '';
        tr.classList.add('row-glow');
        setTimeout(() => tr.classList.remove('row-glow'), 600);
        saveState();
        render();
    }

    const totalActions = e.target.closest('.total-actions');
    if (totalActions && !e.target.matches('.total-input')) {
        const listIndex = parseInt(totalActions.closest('.purchase-list').dataset.listIndex);
        const purchase = state.tabs[state.currentTab].lists[listIndex];

        // ✅ لا يتم التصحيح إلا إذا كان فيه تعديل
        if (purchase.manualTotal) {
            delete purchase.manualTotal;
            saveState();
            render();
            showToast(DOMElements.correctionToast);
        }
    }
};

        
// --- Initialization ---
const init = () => {
    // Load initial data
    loadState();

    // Initial render
    updateDateTime();
    setInterval(updateDateTime, 60000);
    window.addEventListener('resize', updateDateTime);
    render();

    document.addEventListener('focusin', (e) => {
        if (e.target.matches('textarea, input[type="number"], input[type="text"]')) {
            setTimeout(() => {
                e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 350);
        }
    });

    // Attach event listeners
    DOMElements.addBtn.addEventListener('click', handleAddItem);
    DOMElements.purchaseHistory.addEventListener('click', handleHistoryClick);
    DOMElements.purchaseHistory.addEventListener('change', handleHistoryChange);
    DOMElements.purchaseHistory.addEventListener('dblclick', handleHistoryDblClick);



const startListPress = (evt) => {
    const header = evt.target.closest(".purchase-header");
    if (!header) return;
    listLongPressFired = false;
    listPressTimer = setTimeout(() => {
        listLongPressFired = true;
        const listDiv = header.closest(".purchase-list");
        if (listDiv) {  // ✅ تحقق أنه موجود
            DOMElements.deleteListModal.dataset.listToDelete = listDiv.dataset.listIndex;
            showModal(DOMElements.deleteListModal);
        }
    }, 600);
};






    const cancelListPress = () => {
        if (listPressTimer) {
            clearTimeout(listPressTimer);
            listPressTimer = null;
        }
    };

    DOMElements.purchaseHistory.addEventListener("pointerdown", startListPress);
    DOMElements.purchaseHistory.addEventListener("pointerup", cancelListPress);
    DOMElements.purchaseHistory.addEventListener("pointerleave", cancelListPress);
    DOMElements.purchaseHistory.addEventListener("pointercancel", cancelListPress);

    // ✅ Delete List Modal actions
    DOMElements.deleteListModal.addEventListener("click", (e) => {
        if (e.target.dataset.action === "confirm") {
            const listIndex = parseInt(DOMElements.deleteListModal.dataset.listToDelete);
            state.tabs[state.currentTab].lists.splice(listIndex, 1);
            saveState();
            render();
            hideModal(DOMElements.deleteListModal);
        } else if (e.target.dataset.action === "cancel") {
            hideModal(DOMElements.deleteListModal);
        }
    });


















    // Add Tab Modal
    DOMElements.addTabBtn.addEventListener('click', () => {
        DOMElements.addTabInput.value = '';
        showModal(DOMElements.addTabModal);
        DOMElements.addTabInput.focus();
    });

    DOMElements.addTabCancel.addEventListener('click', () => hideModal(DOMElements.addTabModal));
    DOMElements.addTabOk.addEventListener('click', () => {
        const name = DOMElements.addTabInput.value.trim();
        if (name) {
            state.tabs.push({ name: name.slice(0, 18), lists: [] });
            state.currentTab = state.tabs.length - 1;
            saveState();
            render();
            hideModal(DOMElements.addTabModal);
        }
    });

    // Notes Modal
    DOMElements.notesModal.querySelector('.notes-modal-save').addEventListener('click', () => {
        const listIndex = parseInt(DOMElements.notesModal.dataset.listIndex);
        state.tabs[state.currentTab].lists[listIndex].notes = DOMElements.notesModalTextarea.value.trim();
        saveState();
        render();
        hideModal(DOMElements.notesModal);
    });
    DOMElements.notesModal.querySelector('.notes-modal-cancel').addEventListener('click', () => hideModal(DOMElements.notesModal));

    // ✅ Delete Tab Modal
    DOMElements.deleteTabModal.addEventListener("click", (e) => {
        if (e.target.dataset.action === "confirm") {
            const tabIndex = parseInt(DOMElements.deleteTabModal.dataset.tabToDelete);
            if (state.tabs.length > 1) {
                state.tabs.splice(tabIndex, 1);
                state.currentTab = Math.max(0, state.currentTab - 1);
                saveState();
                render();
            } else {
                alert("لا يمكن حذف جميع التبويبات. يجب أن يبقى واحد على الأقل.");
            }
            hideModal(DOMElements.deleteTabModal);
        } else if (e.target.dataset.action === "cancel") {
            hideModal(DOMElements.deleteTabModal);
        }
    });
};

init();

    });
  </script>
  <script>
    function getRosterHomeUrl() {
      var rosterHome = 'https://khalidsaif912.github.io/new/';
      var path = location.pathname || '';

      if (location.hostname && location.hostname.endsWith('github.io')) {
        var segs = path.split('/').filter(Boolean);
        if (segs.length >= 2 && segs[1] === 'docs') {
          try {
            return new URL('/' + segs[0] + '/', location.origin).toString();
          } catch (e) {}
        }
      }

      if (/\/docs\/QuickList(\/|$)/i.test(path) || /^\/docs\//.test(path)) {
        try {
          return new URL('../../', location.href).toString();
        } catch (e) {}
      }

      return rosterHome;
    }

  (function setupHomeButton() {
    var homeBtn = document.getElementById('homeBtn');
    if (!homeBtn) return;
    homeBtn.href = getRosterHomeUrl();
    homeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.assign(getRosterHomeUrl());
    });
  })();

// منع النسخ والقص واللصق خارج inputList
["copy", "cut", "paste"].forEach(eventType => {
  document.addEventListener(eventType, (e) => {
    if (e.target.id !== "inputList" && !e.target.classList.contains("notes-modal-textarea")) {
      e.preventDefault();
      return false;
    }
  });
});

// منع تحديد النص بالماوس (selectstart) — مع السماح للحقول
document.addEventListener("selectstart", (e) => {
  if (e.target.matches("input, textarea")) return;
  e.preventDefault();
  return false;
});

// منع قائمة السياق (الزر الأيمن)
document.addEventListener("contextmenu", (e) => {
  if (e.target.id !== "inputList" && e.target.id !== "notesModalTextarea") {
    e.preventDefault();
    return false;
  }
});

// منع اختصارات لوحة المفاتيح
document.addEventListener("keydown", (e) => {
  // منع Ctrl+A (تحديد الكل)
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "a") {
    if (e.target.id !== "inputList" && e.target.id !== "notesModalTextarea") {
      e.preventDefault();
      return false;
    }
  }
  
  // منع Ctrl+C (نسخ) و Ctrl+X (قص) و Ctrl+V (لصق)
  if ((e.ctrlKey || e.metaKey) && ["c", "x", "v"].includes(e.key.toLowerCase())) {
    if (e.target.id !== "inputList" && e.target.id !== "notesModalTextarea") {
      e.preventDefault();
      return false;
    }
  }
});

// منع السحب والإفلات للنصوص
document.addEventListener("dragstart", (e) => {
  if (e.target.id !== "inputList") {
    e.preventDefault();
    return false;
  }
});



  </script>
