<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <title>Import Duty Roster</title>
  <link rel="canonical" href="https://khalidsaif912.github.io/new/docs/import/">
  <script>
    (function() {
      var CANONICAL = 'https://khalidsaif912.github.io/new/docs/import/';
      var path = location.pathname || '';

      if (path.indexOf('/roster-site/') !== -1) {
        var rest = path.replace(/^.*\/roster-site\/import\/?/, '');
        var target = CANONICAL + (rest ? rest.replace(/\/?$/, '/') : '') + location.search + location.hash;
        location.replace(target);
        return;
      }

      var base = '/import';
      var today = new Date();
      var y = today.getFullYear();
      var m = String(today.getMonth() + 1).padStart(2, '0');
      var d = String(today.getDate()).padStart(2, '0');
      var todayStr = y + '-' + m + '-' + d;
      var available = ["2026-03-01", "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06", "2026-03-07", "2026-03-08", "2026-03-09", "2026-03-10", "2026-03-11", "2026-03-12", "2026-03-13", "2026-03-14", "2026-03-15", "2026-03-16", "2026-03-17", "2026-03-18", "2026-03-19", "2026-03-20", "2026-03-21", "2026-03-22", "2026-03-23", "2026-03-24", "2026-03-25", "2026-03-26", "2026-03-27", "2026-03-28", "2026-03-29", "2026-03-30", "2026-03-31", "2026-04-01", "2026-04-02", "2026-04-03", "2026-04-04", "2026-04-05", "2026-04-06", "2026-04-07", "2026-04-08", "2026-04-09", "2026-04-10", "2026-04-11", "2026-04-12", "2026-04-13", "2026-04-14", "2026-04-15", "2026-04-16", "2026-04-17", "2026-04-18", "2026-04-19", "2026-04-20", "2026-04-21", "2026-04-22", "2026-04-23", "2026-04-24", "2026-04-25", "2026-04-26", "2026-04-27", "2026-04-28", "2026-04-29", "2026-04-30"];
      if (available.indexOf(todayStr) !== -1) {
        location.replace(base + '/' + todayStr + '/');
        return;
      }
      var best = null;
      for (var i = available.length - 1; i >= 0; i--) {
        if (available[i] <= todayStr) { best = available[i]; break; }
      }
      if (!best && available.length) best = available[available.length - 1];
      if (best) location.replace(base + '/' + best + '/');
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://khalidsaif912.github.io/new/docs/import/">
  </noscript>
</head>
