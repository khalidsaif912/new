<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script>
        (function () {
            var meta = document.querySelector('meta[name=viewport]');
            if (!meta) return;
            function fixViewport() {
                var iw = window.innerWidth || 0;
                var sw = Math.min(screen.width || 0, screen.height || 0) || iw;
                if ('ontouchstart' in window && iw > sw + 60) {
                    meta.setAttribute('content', 'width=' + sw + ', initial-scale=1, viewport-fit=cover');
                } else {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1, viewport-fit=cover');
                }
            }
            fixViewport();
            document.addEventListener('DOMContentLoaded', fixViewport);
            window.addEventListener('resize', fixViewport);
        })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حساب الكميات">
    <meta name="theme-color" content="#2196F3">
    <title>حساب الكميات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Rubik:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100%;
            min-height: 100dvh;
            direction: rtl;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 100%;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            padding: 12px 15px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            padding-left: calc(15px + env(safe-area-inset-left, 0px));
            padding-right: calc(15px + env(safe-area-inset-right, 0px));
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 1000 !important;
        }

        .refresh-btn {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: calc(10px + env(safe-area-inset-left, 0px));
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 1001;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .refresh-btn svg {
            display: block;
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.26);
        }

        .refresh-btn:active {
            transform: scale(0.92);
        }

        .refresh-btn.spinning svg {
            animation: refresh-spin 0.65s ease;
        }

        @keyframes refresh-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header h1.header-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 0 2px;
            padding: 0;
            font-weight: inherit;
            font-size: inherit;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.15;
            min-width: 0;
        }

        .header-title-line {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .header-title-line[lang="en"] {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, system-ui, sans-serif;
            font-weight: 700;
            opacity: 0.95;
        }

        .header-app-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
        }

        .main-content {
            position: fixed !important;
            top: var(--header-h, 75px) !important;
            bottom: var(--footer-h, 40px) !important;
            left: 0 !important;
            right: 0 !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            overscroll-behavior: contain;
        }

        .input-section {
            padding: 14px 12px;
            border-bottom: 1px solid #e2e8f0;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }

        .shipment-form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 10px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
            flex-direction: row;
            align-items: flex-end;
        }

        .field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            text-align: right;
            letter-spacing: 0.02em;
        }

        .input-group {
            flex: 1 1 0;
            width: auto;
            min-width: 0;
        }

        .input-group.awb-group {
            flex: 1.2 1 0;
        }

        .input-group.qty-group {
            flex: 0.8 1 0;
        }

        .form-input {
            width: 100%;
            padding: 12px 10px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            min-height: 48px;
            text-align: center;
            direction: ltr;
            background: #fff;
            color: #0f172a;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .form-input::-webkit-outer-spin-button,
        .form-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-group.awb-group .form-input {
            border-color: #90caf9;
            background: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%);
        }

        .input-group.qty-group .form-input {
            border-color: #a5b4fc;
            background: linear-gradient(180deg, #ffffff 0%, #f5f7ff 100%);
        }

        .form-input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .form-input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.14), inset 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .input-group.awb-group .form-input:focus {
            background: #fff;
        }

        .input-group.qty-group .form-input:focus {
            background: #fff;
        }

        .form-input.auto-focused {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.16);
        }

        .btn-add-shipment {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 44px;
            padding: 10px 16px;
            margin-top: 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(180deg, #42a5f5 0%, #1e88e5 50%, #1565c0 100%);
            color: #fff;
            font-family: inherit;
            font-size: 0.94rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow:
                0 4px 14px rgba(21, 101, 192, 0.26),
                inset 0 1px 0 rgba(255, 255, 255, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn-add-shipment svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            stroke: currentColor;
        }

        .btn-add-shipment:hover {
            transform: translateY(-1px);
            box-shadow:
                0 6px 18px rgba(21, 101, 192, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .btn-add-shipment:active {
            transform: translateY(0) scale(0.99);
            box-shadow:
                0 2px 8px rgba(21, 101, 192, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .tabs-container {
            margin: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.07);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .tabs-nav {
            display: flex;
            align-items: flex-end;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            gap: 6px;
            margin-bottom: 0;
            padding: 10px 10px 0;
            background: linear-gradient(180deg, #f1f5f9 0%, #e8eef5 100%);
            border-bottom: 1px solid #dbe4f0;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            padding: 7px 14px;
            border: 1px solid rgba(21, 101, 192, 0.22);
            border-bottom: none;
            cursor: pointer;
            white-space: nowrap;
            border-radius: 10px 10px 0 0;
            background: linear-gradient(180deg, #5d9fd8 0%, #1565c0 100%);
            color: rgba(255, 255, 255, 0.9);
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            transition: transform 0.22s ease, min-height 0.22s ease, padding 0.22s ease, font-size 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0.72;
            transform: translateY(5px) scale(0.93);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
            z-index: 1;
        }

        .tab-btn.active {
            min-height: 44px;
            padding: 10px 22px;
            font-size: 1.02rem;
            font-weight: 700;
            opacity: 1;
            transform: translateY(0) scale(1);
            background: linear-gradient(180deg, #4fc3f7 0%, #1e88e5 52%, #1565c0 100%);
            border-color: #1565c0;
            color: #fff;
            box-shadow:
                0 -3px 10px rgba(21, 101, 192, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
            z-index: 3;
        }

        .tab-btn.complete {
            background: linear-gradient(180deg, #66bb6a 0%, #2e7d32 100%);
            border-color: rgba(46, 125, 50, 0.35);
        }

        .tab-btn.complete.active {
            background: linear-gradient(180deg, #81c784 0%, #43a047 52%, #2e7d32 100%);
            border-color: #2e7d32;
            box-shadow:
                0 -3px 10px rgba(46, 125, 50, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .tab-btn.excess {
            background: linear-gradient(180deg, #e57373 0%, #b71c1c 100%);
            border-color: rgba(183, 28, 28, 0.35);
        }

        .tab-btn.excess.active {
            background: linear-gradient(180deg, #ef5350 0%, #e53935 52%, #c62828 100%);
            border-color: #c62828;
            box-shadow:
                0 -3px 10px rgba(198, 40, 40, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .tab-close {
            position: absolute;
            top: 3px;
            left: 3px;
            background: rgba(255, 255, 255, 0.28);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.45);
            transform: scale(1.06);
        }

        .tab-btn.active .tab-close {
            display: flex;
            width: 20px;
            height: 20px;
            font-size: 13px;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .parts-container {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .parts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: nowrap;
            gap: 10px;
        }

        .parts-header .quantity-display {
            flex: 1;
            min-width: 0;
        }

        .quantity-display {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid #2196F3;
            text-align: center;
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }

        .parts-grid {
            display: grid !important;
            grid-template-columns: repeat(5, 1fr) !important;
            gap: 22px 15px;
            margin: 15px 0;
            padding: 18px 16px 24px;
            border-radius: 12px;
            width: fit-content;
            min-width: 400px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 1px solid #dee2e6;
        }

        .part-row {
            position: relative;
            width: 100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            cursor: grab;
            overflow: visible;
            transition: transform 0.2s ease;
        }

        .part-row:hover {
            transform: translateY(-1px);
        }

        .pallet-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .pallet-stage {
            position: relative;
            width: 92%;
            line-height: 0;
            transform-origin: 50% 0%;
            transform: perspective(280px) rotateX(12deg);
            filter: drop-shadow(0 2px 4px rgba(92, 16, 16, 0.18));
        }

        .pallet-stage::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 12%;
            right: 12%;
            height: 5px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.18) 0%, transparent 72%);
            pointer-events: none;
            z-index: 1;
        }

        .pallet-svg {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            user-select: none;
            transition: filter 0.2s ease;
        }

        .part-row:hover .pallet-svg {
            filter: brightness(1.05);
        }

        .number-3d {
            position: relative;
            width: 92%;
            min-height: 34px;
            margin-bottom: 0;
            z-index: 8;
            font-family: 'Plus Jakarta Sans', 'Rubik', 'Segoe UI', Roboto, system-ui, sans-serif;
            font-size: 33px;
            font-weight: 600;
            font-feature-settings: "tnum" 1, "lnum" 1;
            font-variant-numeric: lining-nums tabular-nums;
            font-synthesis: none;
            text-align: center;
            direction: ltr;
            letter-spacing: 0.05em;
            caret-color: #334155;
            border: none;
            outline: none;
            cursor: text;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            overflow: visible;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            line-height: 1;
            padding: 0 1px;
            color: #1976d2;
            background: none;
            -webkit-text-fill-color: currentColor;
            -webkit-text-stroke: 0;
            filter: none;
            transform: none;
            text-rendering: geometricPrecision;
            text-shadow:
                0 1px 0 #1565c0,
                0 2px 0 #0d47a1,
                0 3px 0 #0a3d91;
            box-shadow: none;
            transition: color 0.15s ease, text-shadow 0.15s ease;
        }

        .part-row:hover .number-3d {
            color: #1e88e5;
            text-shadow:
                0 1px 0 #1976d2,
                0 2px 0 #1565c0,
                0 3px 0 #0d47a1;
        }

        .part-row.ghost-part {
            cursor: pointer;
            opacity: 0.38;
            transition: opacity 0.2s ease, transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .part-row.ghost-part:hover,
        .part-row.ghost-part:focus-visible {
            opacity: 0.58;
            transform: translateY(-1px);
            outline: none;
        }

        .part-row.ghost-part:active {
            opacity: 0.72;
            transform: scale(0.98);
        }

        .part-row.ghost-part .ghost-number {
            pointer-events: none;
            user-select: none;
            color: #64b5f6;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0;
            text-shadow: none;
            min-height: 34px;
        }

        .part-row.ghost-part .pallet-stage {
            pointer-events: none;
        }

        .part-row.ghost-part .pallet-svg {
            opacity: 0.85;
        }

        .number-3d:empty::before {
            content: '0';
            color: #64b5f6;
            text-shadow: 0 1px 0 #42a5f5;
            opacity: 0.55;
        }

        .number-3d:focus,
        .number-3d:focus-visible {
            outline: none;
            box-shadow: none;
            filter: none;
            transform: none;
        }

        .delete-part-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            padding: 0;
            border: 1px solid rgba(229, 57, 53, 0.45);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.97);
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .delete-part-btn::before,
        .delete-part-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 1.5px;
            margin-left: -4px;
            margin-top: -0.75px;
            background: #e53935;
            border-radius: 1px;
            transition: background 0.2s ease;
        }

        .delete-part-btn::before {
            transform: rotate(45deg);
        }

        .delete-part-btn::after {
            transform: rotate(-45deg);
        }

        .delete-part-btn:hover,
        .delete-part-btn:active {
            background: #e53935;
            border-color: #c62828;
            transform: scale(1.06);
            box-shadow: 0 2px 6px rgba(198, 40, 40, 0.28);
        }

        .delete-part-btn:hover::before,
        .delete-part-btn:hover::after,
        .delete-part-btn:active::before,
        .delete-part-btn:active::after {
            background: #fff;
        }

        .remaining-info {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #2196F3;
        }

        .remaining-text {
            font-weight: 600;
            color: #333;
            direction: ltr;
            text-align: center;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .remaining-text .used { color: #4CAF50; }
        .remaining-text .remaining { color: #F44336; }

        .status-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .status-success {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
            border: 2px solid #66BB6A;
        }
        
        .status-error {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            border: 2px solid #ef5350;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; transform: scale(1); }
            51%, 100% { opacity: 0.6; transform: scale(0.95); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes screenFlash {
            0% { background-color: transparent; }
            25% { background-color: rgba(76, 175, 80, 0.3); }
            50% { background-color: rgba(76, 175, 80, 0.1); }
            75% { background-color: rgba(76, 175, 80, 0.3); }
            100% { background-color: transparent; }
        }

        .flash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1500;
        }

        .flash-screen.active {
            animation: screenFlash 0.8s ease-in-out;
        }

        .floating-add-part {
            display: none;
            position: fixed;
            left: 10px;
            right: 10px;
            z-index: 2500;
            margin: 0;
            min-height: 44px;
            padding: 10px 14px;
            border: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.35);
            cursor: pointer;

    <script>
        var shipments = {};
        var activeTab = null;
        var pendingConfirmCallback = null;

        // CUSTOM ALERT
        function showCustomAlert(message, title) {
            title = title || 'تنبيه';
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('customAlertOverlay').classList.add('active');
        }

        function closeCustomAlert() {
            document.getElementById('customAlertOverlay').classList.remove('active');
        }

        // CUSTOM CONFIRM
        function showCustomConfirm(message, callback, title) {
            title = title || 'تأكيد';
            pendingConfirmCallback = callback;
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('customConfirmOverlay').classList.add('active');
        }

        function closeCustomConfirm() {
            document.getElementById('customConfirmOverlay').classList.remove('active');
            pendingConfirmCallback = null;
        }

        function confirmAction() {
            if (pendingConfirmCallback) {
                pendingConfirmCallback();
            }
            closeCustomConfirm();
        }

        // إغلاق عند النقر خارج النافذة
        document.addEventListener('click', function(e) {
            if (e.target.id === 'customAlertOverlay') {
                closeCustomAlert();
            }
            if (e.target.id === 'customConfirmOverlay') {
                closeCustomConfirm();
            }
        });

        // MODAL INFO

        // معالجة إدخال رقم الشحنة
        function handleAWBInput(element) {
            var value = element.value;
            if (value.length >= 4) {
                var quantityInput = document.getElementById('quantity');
                if (quantityInput) {
                    quantityInput.classList.add('auto-focused');
                    quantityInput.focus();
                    setTimeout(function() {
                        quantityInput.classList.remove('auto-focused');
                    }, 2000);
                }
            }
        }

        function openInfoModal() {
            document.getElementById('infoModal').classList.add('active');
        }

        function closeInfoModal() {
            document.getElementById('infoModal').classList.remove('active');
        }

        document.getElementById('infoBtn').addEventListener('click', openInfoModal);

        document.getElementById('infoModal').addEventListener('click', function(e) {
            if (e.target === this) closeInfoModal();
        });

        function addShipment() {
            var awbInput = document.getElementById('awb');
            var quantityInput = document.getElementById('quantity');
            var awb = awbInput.value.trim();
            var quantity = parseInt(quantityInput.value);

            if (!awb) {
                showCustomAlert('يرجى إدخال رقم الشحنة');
                awbInput.focus();
                return;
            }

            if (!quantity || quantity <= 0) {
                showCustomAlert('يرجى إدخال كمية صحيحة');
                quantityInput.focus();
                return;
            }

            if (shipments[awb]) {
                shipments[awb].quantity = quantity;
                updateTabContent(awb);
                setStatus('تم تحديث الشحنة: ' + awb);
            } else {
                shipments[awb] = {
                    quantity: quantity,
                    parts: [{ quantity: '', color: 'default' }],
                    celebrated: false
                };
                createTab(awb);
                setStatus('تم إضافة الشحنة: ' + awb);
            }
            
            updateCount();
            updateTabStatus(awb);
            updateLayoutHeights();
            
            awbInput.value = '';
            quantityInput.value = '';
            awbInput.focus();
            
            setTimeout(function() { 
                switchTab(awb);
                setTimeout(function() {
                    var firstPartElement = document.querySelector('#tab-' + awb + ' [data-index="0"] .number-3d');
                    if (firstPartElement) {
                        firstPartElement.focus();
                    }
                }, 100);
            }, 100);
            saveData();
        }

        function updateTabStatus(awb) {
            var tabBtn = document.querySelector('[data-tab="' + awb + '"]');
            if (!tabBtn) return;
            
            var data = shipments[awb];
            var totalUsed = getTotalUsed(awb);
            var remaining = data.quantity - totalUsed;
            
            tabBtn.classList.remove('complete', 'excess');
            
            if (remaining === 0) {
                tabBtn.classList.add('complete');
                triggerCelebration(awb);
            } else if (remaining < 0) {
                tabBtn.classList.add('excess');
            }
        }

        function createTab(awb) {
            var tabsNav = document.getElementById('tabsNav');
            var tabsContent = document.getElementById('tabsContent');

            var emptyState = tabsContent.querySelector('.empty-state');
            if (emptyState) tabsContent.innerHTML = '';

            var tabBtn = document.createElement('div');
            tabBtn.className = 'tab-btn';
            tabBtn.setAttribute('data-tab', awb);
            tabBtn.innerHTML = awb + '<button class="tab-close" onclick="deleteTab(\'' + awb + '\')" title="حذف">×</button>';
            tabBtn.onclick = function() { switchTab(awb); };
            tabsNav.appendChild(tabBtn);

            var tabContent = document.createElement('div');
            tabContent.className = 'tab-content';
            tabContent.id = 'tab-' + awb;
            tabContent.innerHTML = createTabContent(awb);
            tabsContent.appendChild(tabContent);
            updateLayoutHeights();
        }

        function buildPalletSvg(uid) {
            var pid = 'pl' + String(uid).replace(/[^a-z0-9]/gi, '');
            return '' +
                '<svg class="pallet-svg" viewBox="0 0 100 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
                '<defs>' +
                '<linearGradient id="' + pid + 'base" x1="0" y1="0" x2="0" y2="1">' +
                '<stop offset="0%" stop-color="#e53935"/>' +
                '<stop offset="100%" stop-color="#8b1515"/>' +
                '</linearGradient>' +
                '<linearGradient id="' + pid + 'slat" x1="0" y1="0" x2="0" y2="1">' +
                '<stop offset="0%" stop-color="#c62828"/>' +
                '<stop offset="100%" stop-color="#8b1515"/>' +
                '</linearGradient>' +
                '</defs>' +
                '<ellipse cx="50" cy="26.5" rx="38" ry="2.5" fill="rgba(0,0,0,0.1)"/>' +
                '<rect x="7" y="4" width="86" height="15" rx="2.5" fill="url(#' + pid + 'base)" stroke="#4a0a0a" stroke-width="0.7"/>' +
                '<rect x="9.5" y="6" width="19" height="11" rx="1" fill="url(#' + pid + 'slat)" stroke="#4a0a0a" stroke-width="0.45"/>' +
                '<rect x="40.5" y="6" width="19" height="11" rx="1" fill="url(#' + pid + 'slat)" stroke="#4a0a0a" stroke-width="0.45"/>' +
                '<rect x="71.5" y="6" width="19" height="11" rx="1" fill="url(#' + pid + 'slat)" stroke="#4a0a0a" stroke-width="0.45"/>' +
                '<rect x="28" y="8.5" width="14" height="7" rx="0.5" fill="#2d0808"/>' +
                '<rect x="58" y="8.5" width="14" height="7" rx="0.5" fill="#2d0808"/>' +
                '</svg>';
        }

        function createTabContent(awb) {
            var data = shipments[awb];
            if (!data) return '<div>خطأ في البيانات</div>';
            
            var totalUsed = getTotalUsed(awb);
            var remaining = data.quantity - totalUsed;
            
            var statusIcon = '';
            if (remaining === 0) {
                statusIcon = '<span class="status-icon status-success">✓</span>';
            } else if (remaining < 0) {
                statusIcon = '<span class="status-icon status-error">✕</span>';
            }
            
            var content = '<div class="parts-container">';
            content += '<div class="parts-header">';
            content += '<div class="quantity-display">QTY: ' + data.quantity + '</div>';
            content += '<div class="quantity-display">AWB: ' + awb + '</div>';
            content += '</div>';
            
            content += '<div class="remaining-info">';
            content += '<div class="remaining-text">';
            content += statusIcon + '<span class="used">Used: ' + totalUsed + '</span> | ';
            content += '<span class="remaining">Remaining: ' + remaining + '</span>';
            content += '</div></div>';
            
            content += '<div class="parts-grid">';
            for (var i = 0; i < data.parts.length; i++) {
                var part = data.parts[i];
                content += '<div class="part-row" data-index="' + i + '" data-awb="' + awb + '">';
                content += '<button type="button" class="delete-part-btn" onclick="deletePart(\'' + awb + '\', ' + i + ')" title="حذف" aria-label="حذف"></button>';
                content += '<div class="pallet-stack">';
                content += '<div class="number-3d" contenteditable="true" inputmode="numeric" onkeydown="handlePartKeydown(event)" onkeyup="handlePartKeyup(event)" oninput="updatePart(this)" onfocus="selectAllOnFocus(this)">' + (part.quantity || '') + '</div>';
                content += '<div class="pallet-stage">';
                content += buildPalletSvg(awb + '_' + i);
                content += '</div>';
                content += '</div>';
                content += '</div>';
            }

            if (remaining > 0) {
                content += '<div class="part-row ghost-part" role="button" tabindex="0" aria-label="إضافة جزء سريع" onclick="activateGhostPart(\'' + awb + '\')" onkeydown="handleGhostPartKeydown(event, \'' + awb + '\')">';
                content += '<div class="pallet-stack">';
                content += '<div class="number-3d ghost-number">+</div>';
                content += '<div class="pallet-stage">';
                content += buildPalletSvg(awb + '_ghost');
                content += '</div>';
                content += '</div>';
                content += '</div>';
            }
            
            content += '</div>';
            content += '</div>';
            
            return content;
        }

        function switchTab(awb) {
            var tabs = document.querySelectorAll('.tab-btn');
            var contents = document.querySelectorAll('.tab-content');
            
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            for (var i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }

            var tabBtn = document.querySelector('[data-tab="' + awb + '"]');
            var tabContent = document.getElementById('tab-' + awb);
            
            if (tabBtn && tabContent) {
                tabBtn.classList.add('active');
                tabContent.classList.add('active');
                activeTab = awb;
            }
        }

        function activateGhostPart(awb) {
            addPart(awb);
        }

        function handleGhostPartKeydown(event, awb) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                activateGhostPart(awb);
            }
        }

        function addPart(awb) {
            var data = shipments[awb];
            var totalUsed = getTotalUsed(awb);
            var remaining = data.quantity - totalUsed;
            
            if (remaining <= 0) {
                alert('تم استخدام جميع الكمية');
                return;
            }
            
            data.parts.push({ quantity: '', color: 'default' });
            updateTabContent(awb);
            setStatus('تم إضافة جزء جديد');
            
            setTimeout(function() {
                var newPartIndex = data.parts.length - 1;
                var newPartElement = document.querySelector('#tab-' + awb + ' [data-index="' + newPartIndex + '"] .number-3d');
                if (newPartElement) {
                    newPartElement.focus();
                }
            }, 100);
            
            saveData();
        }

        function deletePart(awb, index) {
            var data = shipments[awb];
            
            if (data.parts.length > 1) {
                showCustomConfirm('هل تريد حذف هذا الجزء؟', function() {
                    data.parts.splice(index, 1);
                    updateTabContent(awb);
                    updateTabStatus(awb);
                    setStatus('تم حذف الجزء');
                    saveData();
                }, 'تأكيد الحذف');
            } else {
                showCustomAlert('لا يمكن حذف الجزء الأخير', 'تنبيه');
            }
        }

        function updateTabContent(awb) {
            var tabContent = document.getElementById('tab-' + awb);
            if (tabContent) {
                tabContent.innerHTML = createTabContent(awb);
            }
        }

        function getTotalUsed(awb) {
            var data = shipments[awb];
            if (!data) return 0;
            
            var total = 0;
            for (var i = 0; i < data.parts.length; i++) {
                total += parseInt(data.parts[i].quantity) || 0;
            }
            return total;
        }

        function updatePart(element) {
            var awb = element.closest('[data-awb]').getAttribute('data-awb');
            var index = parseInt(element.closest('[data-index]').getAttribute('data-index'));
            var value = element.textContent.replace(/[^0-9]/g, '').substring(0, 6);
            
            if (element.textContent !== value) {
                element.textContent = value;
            }
            
            var data = shipments[awb];
            if (data && data.parts[index]) {
                data.parts[index].quantity = value === '' ? 0 : parseInt(value);
                updateRemainingInfo(awb);
                updateTabStatus(awb);
                saveData();
            }
        }

        function updateRemainingInfo(awb) {
            var remainingContainer = document.querySelector('#tab-' + awb + ' .remaining-info .remaining-text');
            if (remainingContainer) {
                var data = shipments[awb];
                var totalUsed = getTotalUsed(awb);
                var remaining = data.quantity - totalUsed;
                
                var statusIcon = '';
                if (remaining === 0) {
                    statusIcon = '<span class="status-icon status-success">✓</span>';
                } else if (remaining < 0) {
                    statusIcon = '<span class="status-icon status-error">✕</span>';
                }
                
                remainingContainer.innerHTML = statusIcon + '<span class="used">Used: ' + totalUsed + '</span> | <span class="remaining">Remaining: ' + remaining + '</span>';
            }
        }

        function handleInput(event) {
            var allowedKeys = ['Backspace', 'Delete', 'Tab', 'Enter', 'ArrowLeft', 'ArrowRight'];
            
            if (!allowedKeys.includes(event.key) && (event.key < '0' || event.key > '9')) {
                event.preventDefault();
                return;
            }
            
            if (event.key === 'Enter') {
                event.preventDefault();
                event.target.blur();
            }
        }

        var zeroHoldTimer = null;
        var zeroHoldFired = false;

        function handlePartKeydown(event) {
            handleInput(event);
            if (event.key !== '0' || event.repeat) return;

            var el = event.target;
            clearTimeout(zeroHoldTimer);
            zeroHoldFired = false;
            zeroHoldTimer = setTimeout(function() {
                var row = el.closest('[data-awb]');
                if (!row || document.activeElement !== el) return;
                var awb = row.getAttribute('data-awb');
                if (!awb) return;
                zeroHoldFired = true;
                addPart(awb);
                setStatus('تم إضافة جزء (اختصار: 0 مطول)');
            }, 600);
        }

        function handlePartKeyup(event) {
            if (event.key !== '0') return;
            clearTimeout(zeroHoldTimer);
            zeroHoldTimer = null;
            if (zeroHoldFired) {
                var el = event.target;
                if (el && el.textContent === '0') {
                    el.textContent = '';
                    updatePart(el);
                }
                zeroHoldFired = false;
            }
        }

        function selectAllOnFocus(element) {
            setTimeout(function() {
                if (window.getSelection && document.createRange) {
                    var selection = window.getSelection();
                    var range = document.createRange();
                    selection.removeAllRanges();
                    range.selectNodeContents(element);
                    selection.addRange(range);
                }
            }, 10);
        }

        function deleteTab(awb) {
            showCustomConfirm('هل أنت متأكد من حذف الشحنة: ' + awb + '؟', function() {
                delete shipments[awb];
                
                var tabBtn = document.querySelector('[data-tab="' + awb + '"]');
                if (tabBtn) tabBtn.remove();
                
                var tabContent = document.getElementById('tab-' + awb);
                if (tabContent) tabContent.remove();
                
                var remainingTabs = Object.keys(shipments);
                if (remainingTabs.length > 0) {
                    setTimeout(function() { switchTab(remainingTabs[0]); }, 100);
                } else {
                    document.getElementById('tabsContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔭</div><h3>لا توجد شحنات</h3><p>أضف شحنة جديدة للبدء</p></div>';
                    activeTab = null;
                }
                
                updateCount();
                setStatus('تم حذف الشحنة: ' + awb);
                saveData();
            }, 'تأكيد الحذف');
        }

        function updateCount() {
            var totalShipments = document.getElementById('totalShipments');
            totalShipments.textContent = 'الشحنات: ' + Object.keys(shipments).length;
        }

        function setStatus(message) {
            var statusText = document.getElementById('statusText');
            statusText.textContent = message;
            setTimeout(function() { 
                statusText.textContent = 'جاهز للاستخدام'; 
            }, 3000);
        }

        function saveData() {
            try {
                var data = {
                    shipments: shipments,
                    activeTab: activeTab,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('quantitySplitterData', JSON.stringify(data));
            } catch (error) {
                console.warn('فشل في حفظ البيانات:', error);
            }
        }

        function loadData() {
            try {
                var savedData = localStorage.getItem('quantitySplitterData');
                if (savedData) {
                    var data = JSON.parse(savedData);
                    shipments = data.shipments || {};
                    activeTab = data.activeTab;
                    
                    var awbs = Object.keys(shipments);
                    for (var i = 0; i < awbs.length; i++) {
                        createTab(awbs[i]);
                        updateTabStatus(awbs[i]);
                    }
                    
                    if (activeTab && shipments[activeTab]) {
                        setTimeout(function() { switchTab(activeTab); }, 100);
                    } else if (awbs.length > 0) {
                        setTimeout(function() { switchTab(awbs[0]); }, 100);
                    }
                    
                    updateCount();
                    setStatus('تم استعادة البيانات المحفوظة');
                    return true;
                }
            } catch (error) {
                console.warn('فشل في تحميل البيانات:', error);
            }
            return false;
        }

        function triggerCelebration(awb) {
            try {
                if (awb && shipments && shipments[awb]) {
                    if (shipments[awb].celebrated) return;
                    shipments[awb].celebrated = true;
                    saveData();
                }
            } catch(e){ console.warn(e); }
            showCompletionNotification(awb);
        }

        function showCompletionNotification(awb) {
            setStatus('✓ تم إكمال الشحنة: ' + awb + ' بنجاح');
            
            // تأثير الوميض
            var flashScreen = document.getElementById('flashScreen');
            if (flashScreen) {
                flashScreen.classList.remove('active');
                // إعادة تشغيل الحركة
                void flashScreen.offsetWidth;
                flashScreen.classList.add('active');
                
                // إزالة التأثير بعد انتهاءه
                setTimeout(function() {
                    flashScreen.classList.remove('active');
                }, 800);
            }
            
            // إضافة تأثير بصري على التبويب
            var tabBtn = document.querySelector('[data-tab="' + awb + '"]');
            if (tabBtn) {
                tabBtn.style.animation = 'none';
                setTimeout(function() {
                    tabBtn.style.animation = 'pulse 0.6s ease-in-out';
                }, 10);
            }
        }

        // Override alert and confirm globally
        window.alert = function(message) {
            showCustomAlert(message, 'تنبيه');
        };

        window.confirm = function(message) {
            showCustomConfirm(message, function() {
                // This is handled by the confirm action
            }, 'تأكيد');
            return true;
        };

        // منع أي نوافذ المتصفح
        if (typeof navigator !== 'undefined') {
            window.addEventListener('beforeunload', function(e) {
                saveData();
            });
        }

        // منع سلوك المتصفح الافتراضي
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('drop', function(e) {
            e.preventDefault();
        });

        // تحديث ارتفاع الهيدر والفوتر ديناميكياً (مهم للجوال)
        function updateLayoutHeights() {
            var header = document.querySelector('.header');
            var footer = document.querySelector('.footer-bar');
            if (header) {
                document.documentElement.style.setProperty('--header-h', header.offsetHeight + 'px');
            }
            if (footer) {
                document.documentElement.style.setProperty('--footer-h', footer.offsetHeight + 'px');
            }
        }

        function scrollFocusedIntoView() {
            document.addEventListener('focusin', function(e) {
                if (e.target.matches('.number-3d[contenteditable]')) {
                    showFloatingAddPart(true);
                    return;
                }
                if (e.target.matches('.form-input')) {
                    setTimeout(function() {
                        e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 350);
                }
            });

            document.addEventListener('focusout', function(e) {
                if (e.target.matches('.number-3d[contenteditable]')) {
                    setTimeout(function() {
                        if (!document.activeElement ||
                            !document.activeElement.matches('.number-3d[contenteditable], #floatingAddPartBtn')) {
                            showFloatingAddPart(false);
                        }
                    }, 120);
                }
            });
        }

        function keyboardInset() {
            var vv = window.visualViewport;
            if (!vv) return 0;
            return Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
        }

        function positionFloatingAddPart() {
            var btn = document.getElementById('floatingAddPartBtn');
            if (!btn) return;
            var inset = keyboardInset();
            var keyboardOpen = inset > 60;
            var editingPart = document.activeElement &&
                document.activeElement.matches('.number-3d[contenteditable]');

            if (keyboardOpen && editingPart && activeTab) {
                document.body.classList.add('keyboard-open');
                btn.classList.add('visible');
                btn.style.bottom = (inset + 8) + 'px';
            } else {
                document.body.classList.remove('keyboard-open');
                btn.classList.remove('visible');
            }
        }

        function showFloatingAddPart(show) {
            if (show && activeTab) {
                positionFloatingAddPart();
                setTimeout(positionFloatingAddPart, 250);
                setTimeout(positionFloatingAddPart, 500);
            } else {
                document.body.classList.remove('keyboard-open');
                var btn = document.getElementById('floatingAddPartBtn');
                if (btn) btn.classList.remove('visible');
            }
        }

        function setupFloatingAddPart() {
            var btn = document.getElementById('floatingAddPartBtn');
            if (!btn) return;

            btn.addEventListener('click', function(e) {
                e.preventDefault();
                if (!activeTab) return;
                addPart(activeTab);
            });

            btn.addEventListener('mousedown', function(e) {
                e.preventDefault();
            });

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', positionFloatingAddPart);
                window.visualViewport.addEventListener('scroll', positionFloatingAddPart);
            }
            window.addEventListener('resize', positionFloatingAddPart);
        }

        function refreshCalculatorPage() {
            var btn = document.getElementById('refreshBtn');
            if (btn) btn.classList.add('spinning');
            var url = new URL(window.location.href);
            url.searchParams.set('v', String(Date.now()));
            window.setTimeout(function() {
                window.location.replace(url.toString());
            }, 180);
        }

        function setupRefreshButton() {
            var btn = document.getElementById('refreshBtn');
            if (!btn) return;
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                refreshCalculatorPage();
            });
        }

        window.onload = function() {
            updateLayoutHeights();
            scrollFocusedIntoView();
            setupFloatingAddPart();
            setupRefreshButton();
            window.addEventListener('resize', updateLayoutHeights);
            window.addEventListener('orientationchange', function() {
                setTimeout(updateLayoutHeights, 150);
            });
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', updateLayoutHeights);
            }

            if (!loadData()) {
                setStatus('بدء جلسة جديدة - أضف شحنة للبدء');
            }
            
            var awbInput = document.getElementById('awb');
            if (awbInput) {
                awbInput.focus();
            }
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.target.id === 'awb' || e.target.id === 'quantity')) {
                    e.preventDefault();
                    addShipment();
                }
            });
            
            window.addEventListener('beforeunload', function(e) {
                saveData();
            });
            
            setInterval(function() {
                if (Object.keys(shipments).length > 0) {
                    saveData();
                }
            }, 60000);
        };
    </script>
</body>
</html>
