<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A Cup of Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#eef1f7;color:#18243a;font-family:'IBM Plex Sans Arabic','DM Sans',Tahoma,sans-serif;min-height:100dvh}
    .wrap{max-width:760px;margin:0 auto;padding:16px 14px 36px}

    /* ── Header ── */
    .header{
      position:relative;overflow:hidden;
      padding:22px 18px 18px;border-radius:20px;
      background:linear-gradient(135deg,#1e40af 0%,#1976d2 50%,#0ea5e9 100%);
      box-shadow:0 8px 28px rgba(30,64,175,.25);
    }
    .header::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(circle at 84% 18%,rgba(255,255,255,.18) 0%,transparent 34%),
                 radial-gradient(circle at 14% 90%,rgba(255,255,255,.10) 0%,transparent 28%);
    }
    .hCircle{position:absolute;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09)}
    .hCircle1{width:200px;height:200px;right:-60px;top:-70px}
    .hCircle2{width:120px;height:120px;right:70px;bottom:-50px}

    /* ── Header text ── */
    .heroText{position:relative;z-index:1;}
    .heroText h1{font:900 28px/1.05 'Sora',sans-serif;color:#fff;letter-spacing:-.04em;margin:0}
    .heroText p{margin:5px 0 0;font-size:12px;color:rgba(255,255,255,.78);font-weight:700}

    /* ── Train strip (inside header) ── */
    .trainStrip{
      position:relative;z-index:1;
      margin-top:14px;
      display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    }
    .car-btn{
      width:60px;height:60px;padding:3px;
      border-radius:10px;border:2px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.10);
      cursor:pointer;transition:.18s;overflow:hidden;flex-shrink:0;
    }
    .car-btn img{
      width:100%;height:100%;object-fit:cover;
      border-radius:7px;display:block;
    }
    .car-btn.active{
      border-color:#fff;
      transform:scale(1.12) translateY(-2px);
      box-shadow:0 6px 18px rgba(0,0,0,.30);
    }
    .car-btn:hover:not(.active){
      border-color:rgba(255,255,255,.55);
      transform:scale(1.06);
    }

    /* ── Back button (small, inside header) ── */
    .back-btn{
      display:inline-flex;align-items:center;gap:6px;
      margin-top:12px;position:relative;z-index:1;
      padding:6px 14px;border-radius:999px;
      background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
      color:rgba(255,255,255,.92);font-size:11px;font-weight:800;
      text-decoration:none;transition:.2s;
    }
    .back-btn:hover{background:rgba(255,255,255,.25)}

    /* ── Viewer ── */
    .viewer{
      margin-top:14px;border-radius:16px;overflow:hidden;
      border:1px solid rgba(0,0,0,.10);
      box-shadow:0 8px 24px rgba(15,23,42,.12);
    }
    .viewer-screen{
      background:#0c1222;
      display:flex;align-items:center;justify-content:center;
      min-height:400px;padding:16px;
    }
    .viewer-screen img{
      max-width:100%;max-height:74vh;
      width:auto;height:auto;
      object-fit:contain;border-radius:8px;
      display:block;
    }
    .viewer-bar{
      background:#fff;
      padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border-top:1px solid rgba(0,0,0,.08);
    }
    .viewer-label{font-size:13px;font-weight:700;color:#6b7a96}
    .viewer-nav{display:flex;gap:8px}
    .nav-btn{
      padding:5px 14px;border-radius:8px;font-size:12px;font-weight:800;
      border:1px solid rgba(0,0,0,.12);background:#f1f5ff;color:#1e40af;
      cursor:pointer;transition:.15s;
    }
    .nav-btn:hover{background:#dce7ff}

    /* ── Empty ── */
    .empty{
      margin-top:14px;padding:28px;text-align:center;
      color:#6b7a96;font-size:13px;border-radius:16px;
      background:rgba(255,255,255,.7);border:1px dashed rgba(0,0,0,.12);
      display:none;
    }

    @media(max-width:480px){
      .car-btn{width:52px;height:52px}
      .heroText h1{font-size:22px}
      .viewer-screen{min-height:280px;padding:10px}
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="hCircle hCircle1"></div>
    <div class="hCircle hCircle2"></div>

    <div class="heroText">
      <h1>A Cup of Book</h1>
      <p>Tap a cover to read</p>
    </div>

    <!-- Train strip of thumbnails -->
    <div class="trainStrip" id="trainStrip"></div>

    <a class="back-btn" href="../training/">
      📚 Training schedule
    </a>
  </div>

  <!-- Large viewer -->
  <div class="viewer" id="viewer" style="display:none">
    <div class="viewer-screen">
      <img id="bigImg" src="" alt="Book page">
    </div>
    <div class="viewer-bar">
      <span class="viewer-label" id="viewerLabel"></span>
      <div class="viewer-nav">
        <button class="nav-btn" onclick="nav(-1)">◀ Prev</button>
        <button class="nav-btn" onclick="nav(1)">Next ▶</button>
      </div>
    </div>
  </div>

  <div class="empty" id="empty">No images found in the local gallery.</div>

</div>

<script>
(function(){
  var FILES = [
    'cup_of_book_01.jpg',
    'cup_of_book_02.jpg',
    'cup_of_book_03.jpg',
    'cup_of_book_04.jpg'
  ];
  var BASE = 'images/';
  var loaded = [];
  var cur = 0;

  var strip   = document.getElementById('trainStrip');
  var viewer  = document.getElementById('viewer');
  var bigImg  = document.getElementById('bigImg');
  var lbl     = document.getElementById('viewerLabel');
  var empty   = document.getElementById('empty');

  function selectIdx(i) {
    cur = i;
    strip.querySelectorAll('.car-btn').forEach(function(b, idx) {
      b.classList.toggle('active', idx === i);
    });
    bigImg.src = loaded[i].src;
    lbl.textContent = 'Book ' + String(i + 1).padStart(2, '0') + ' of ' + loaded.length;
    viewer.style.display = '';
  }

  window.nav = function(dir) {
    if (!loaded.length) return;
    selectIdx((cur + dir + loaded.length) % loaded.length);
  };

  FILES.forEach(function(name) {
    var src = BASE + name;
    var probe = new Image();
    probe.onload = function() {
      var idx = loaded.length;
      loaded.push({ src: src });

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'car-btn';
      btn.title = 'Book ' + (idx + 1);
      btn.innerHTML = '<img src="' + src + '" alt="Book ' + (idx + 1) + '">';
      btn.addEventListener('click', (function(i){ return function(){ selectIdx(i); }; })(idx));
      strip.appendChild(btn);

      if (idx === 0) selectIdx(0);
    };
    probe.src = src;
  });

  setTimeout(function() {
    if (!loaded.length) {
      empty.style.display = '';
    }
  }, 1400);
})();
</script>
</body>
</html>
