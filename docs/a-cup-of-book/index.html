<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script defer src="../ios-tap-fix.js?v=20260625a"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A Cup of Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#eef1f7;color:#18243a;
      font-family:'IBM Plex Sans Arabic','DM Sans',Tahoma,sans-serif;
      min-height:100dvh;
    }
    .wrap{
      width:100%;max-width:none;margin:0;padding:0;
    }

    /* ── Header ── */
    .header{
      position:relative;overflow:hidden;flex-shrink:0;
      padding:12px 12px 10px;padding-top:calc(10px + env(safe-area-inset-top,0px));
      border-radius:0;
      background:linear-gradient(135deg,#1e40af 0%,#1976d2 50%,#0ea5e9 100%);
      box-shadow:0 4px 16px rgba(30,64,175,.22);
    }
    .header::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(circle at 84% 18%,rgba(255,255,255,.18) 0%,transparent 34%),
                 radial-gradient(circle at 14% 90%,rgba(255,255,255,.10) 0%,transparent 28%);
    }
    .hCircle{position:absolute;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09)}
    .hCircle1{width:200px;height:200px;right:-60px;top:-70px}
    .hCircle2{width:120px;height:120px;right:70px;bottom:-50px}

    /* ── Header text ── */
    .heroText{position:relative;z-index:1;}
    .heroText h1{font:900 22px/1.05 'Sora',sans-serif;color:#fff;letter-spacing:-.04em;margin:0}
    .heroText p{margin:4px 0 0;font-size:11px;color:rgba(255,255,255,.78);font-weight:700}

    /* ── Train strip (inside header) ── */
    .trainStrip{
      position:relative;z-index:1;
      margin-top:10px;
      display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    }
    .car-btn{
      width:60px;height:60px;padding:3px;
      border-radius:10px;border:2px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.10);
      cursor:pointer;transition:.18s;overflow:hidden;flex-shrink:0;
    }
    .car-btn img{
      width:100%;height:100%;object-fit:cover;
      border-radius:7px;display:block;
    }
    .car-btn.active{
      border-color:#fff;
      transform:scale(1.12) translateY(-2px);
      box-shadow:0 6px 18px rgba(0,0,0,.30);
    }
    .car-btn:hover:not(.active){
      border-color:rgba(255,255,255,.55);
      transform:scale(1.06);
    }

    /* ── Header quick links ── */
    .quickLinks{
      display:flex;flex-wrap:wrap;align-items:center;gap:6px;
      margin-top:8px;position:relative;z-index:1;
    }
    .quickBtn{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:999px;
      background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
      color:rgba(255,255,255,.92);font-size:11px;font-weight:800;
      text-decoration:none;transition:.2s;
    }
    .quickBtn:hover{background:rgba(255,255,255,.25)}

    /* ── Viewer: full width, natural height (readable) ── */
    .viewer{
      width:100%;margin:0;
      border:none;border-radius:0;box-shadow:none;
    }
    .viewer-screen{
      width:100%;
      background:#0c1222;
      padding:0;
      line-height:0;
    }
    .viewer-screen img{
      width:100%;
      height:auto;
      max-width:100%;
      display:block;
      margin:0 auto;
      border-radius:0;
    }
    .viewer-bar{
      flex-shrink:0;
      background:#fff;
      padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border-top:1px solid rgba(0,0,0,.08);
    }
    .viewer-label{font-size:13px;font-weight:700;color:#6b7a96}
    .viewer-nav{display:flex;gap:8px}
    .nav-btn{
      padding:5px 14px;border-radius:8px;font-size:12px;font-weight:800;
      border:1px solid rgba(0,0,0,.12);background:#f1f5ff;color:#1e40af;
      cursor:pointer;transition:.15s;
    }
    .nav-btn:hover{background:#dce7ff}

    /* ── Empty ── */
    .empty{
      display:none;
      padding:28px 16px;text-align:center;
      color:#6b7a96;font-size:13px;
      background:#fff;
    }

    @media(max-width:480px){
      .car-btn{width:48px;height:48px}
      .heroText h1{font-size:18px}
    }
  
.titleWithIcon{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap}
.titleWithIcon .titleIcon{line-height:0;display:inline-flex}
.titleWithIcon .titleIcon svg{display:block}
.quickBtn{display:inline-flex;align-items:center;gap:6px}
.quickBtn-icon{line-height:0;display:inline-flex;flex-shrink:0}
.quickBtn-icon svg{display:block}
.rosterIconWrap,.dockValue.searchGlyph,.savedIcon,.backIcon,.courseIcon{
  line-height:0;display:inline-flex;align-items:center;justify-content:center
}
.rosterIconWrap svg,.dockValue.searchGlyph svg,.savedIcon svg,.backIcon svg{display:block}
.courseIcon{font-size:0;color:var(--accent,#2563eb)}
.courseIcon svg{display:block}
.peopleBadge .peopleIconSvg{display:inline-block;vertical-align:-2px;margin-inline-end:3px}
.badge.peopleBadge{display:inline-flex;align-items:center;gap:4px}

</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="hCircle hCircle1"></div>
    <div class="hCircle hCircle2"></div>

    <div class="heroText">
      <h1>A Cup of Book</h1>
      <p>Tap a cover to read</p>
    </div>

    <!-- Train strip of thumbnails -->
    <div class="trainStrip" id="trainStrip"></div>

    <div class="quickLinks">
      <a class="quickBtn" href="../training/"><span class="quickBtn-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span><span>Training schedule</span></a>
      <a class="quickBtn" href="../" aria-label="العودة إلى الروستر الصادر"><span class="quickBtn-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.8 19.2 16 12l-3.5-1.5L3 3l4 12 4-1 2.5 3.5 3.5 1.8 4.2z"/></svg></span><span>الصادر</span></a>
      <a class="quickBtn" href="../import/" aria-label="الذهاب إلى الروستر الوارد"><span class="quickBtn-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.8 19.2 16 12l-3.5-1.5L3 3l4 12 4-1 2.5 3.5 3.5 1.8 4.2z"/></svg></span><span>الوارد</span></a>
    </div>
  </div>

  <!-- Large viewer -->
  <div class="viewer" id="viewer" style="display:none">
    <div class="viewer-screen">
      <img id="bigImg" src="" alt="Book page">
    </div>
    <div class="viewer-bar">
      <span class="viewer-label" id="viewerLabel"></span>
      <div class="viewer-nav">
        <button class="nav-btn" onclick="nav(-1)">◀ Prev</button>
        <button class="nav-btn" onclick="nav(1)">Next ▶</button>
      </div>
    </div>
  </div>

  <div class="empty" id="empty">No images found in the local gallery.</div>

</div>

<script>
(function(){
  var FILES = ["cup_of_book_01.jpg", "cup_of_book_02.jpg", "cup_of_book_03.jpg", "cup_of_book_04.jpg", "cup_of_book_05.jpg", "cup_of_book_06.jpg", "cup_of_book_07.jpg", "cup_of_book_08.jpg", "cup_of_book_09.jpg"];
  var BASE = 'images/';
  var loaded = [];
  var cur = 0;

  var strip   = document.getElementById('trainStrip');
  var viewer  = document.getElementById('viewer');
  var bigImg  = document.getElementById('bigImg');
  var lbl     = document.getElementById('viewerLabel');
  var empty   = document.getElementById('empty');

  function selectIdx(i) {
    cur = i;
    strip.querySelectorAll('.car-btn').forEach(function(b, idx) {
      b.classList.toggle('active', idx === i);
    });
    bigImg.src = loaded[i].src;
    lbl.textContent = 'Book ' + String(i + 1).padStart(2, '0') + ' of ' + loaded.length;
    viewer.style.display = 'block';
  }

  window.nav = function(dir) {
    if (!loaded.length) return;
    selectIdx((cur + dir + loaded.length) % loaded.length);
  };

  FILES.forEach(function(name) {
    var src = BASE + name;
    var probe = new Image();
    probe.onload = function() {
      var idx = loaded.length;
      loaded.push({ src: src });

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'car-btn';
      btn.title = 'Book ' + (idx + 1);
      btn.innerHTML = '<img src="' + src + '" alt="Book ' + (idx + 1) + '">';
      btn.addEventListener('click', (function(i){ return function(){ selectIdx(i); }; })(idx));
      strip.appendChild(btn);

      if (idx === 0) selectIdx(0);
    };
    probe.src = src;
  });

  setTimeout(function() {
    if (!loaded.length) {
      empty.style.display = 'block';
    }
  }, 1400);
})();
</script>
</body>
</html>
