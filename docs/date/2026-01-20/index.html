<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting">
  <title>Duty Roster</title>
  <style>
    /* ═══════ RESET ═══════ */
    body {
      margin:0; padding:0;
      background:#eef1f7;
      font-family:'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
      color:#0f172a;
      -webkit-font-smoothing:antialiased;
    }
    * { box-sizing:border-box; }

    /* ═══════ WRAP ═══════ */
    .wrap { max-width:680px; margin:0 auto; padding:16px 14px 28px; }

    /* ═══════ HEADER ═══════ */
    .header {
      background:linear-gradient(135deg, #1e40af 0%, #1976d2 50%, #0ea5e9 100%);
      color:#fff;
      padding:26px 18px 24px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 8px 28px rgba(30,64,175,.25);
      position:relative;
      overflow:hidden;
    }
    .header::before {
      content:''; position:absolute;
      top:-30px; right:-40px;
      width:140px; height:140px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
    }
    .header::after {
      content:''; position:absolute;
      bottom:-50px; left:-30px;
      width:160px; height:160px;
      border-radius:50%;
      background:rgba(255,255,255,.06);
    }
    .header h1 { margin:0; font-size:24px; font-weight:800; position:relative; z-index:1; letter-spacing:-.3px; }

    /* زر اللغة */
    .langToggle {
      position:absolute; top:12px; right:12px; z-index:30;
      background:transparent; border:none; border-radius:0;
      min-width:auto; height:auto; padding:4px;
      display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
      gap:2px; color:#fff; font-size:0; cursor:pointer;
      box-shadow:none; backdrop-filter:none; -webkit-backdrop-filter:none;
      transition:transform .2s ease, opacity .2s ease;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    body.ar .langToggle { right:12px; left:auto; }
    .langToggle:hover { background:transparent; transform:scale(1.08); opacity:.92; }
    .langToggle-icon { line-height:0; display:flex; align-items:center; justify-content:center; }
    .langToggle-icon svg {
      display:block; width:18px; height:18px;
      filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
    }
    .langToggle-label {
      font-size:10px; font-weight:800; line-height:1; letter-spacing:.02em;
      text-shadow:0 1px 3px rgba(0,0,0,.65);
    }
    #banner-changer-btn {
      position:absolute; top:12px; left:12px; z-index:30;
      background:transparent; border:none; border-radius:0;
      min-width:auto; min-height:auto; padding:4px;
      color:#fff; cursor:pointer; line-height:0;
      box-shadow:none; backdrop-filter:none; -webkit-backdrop-filter:none;
      display:inline-flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation;
      transition:transform .2s ease, opacity .2s ease;
    }
    #banner-changer-btn:hover { background:transparent; transform:scale(1.08); opacity:.92; }
    #banner-changer-btn .banner-changer-icon svg {
      display:block; width:20px; height:20px;
      filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
    }
    body.ar #banner-changer-btn { left:12px; right:auto; }
    @media (max-width:720px) {
      .langToggle { padding:6px; }
      .langToggle-icon svg { width:20px; height:20px; }
      .langToggle-label { font-size:11px; }
      #banner-changer-btn { padding:6px; }
      #banner-changer-btn .banner-changer-icon svg { width:22px; height:22px; }
    }
body.ar { direction:rtl; font-family:'Segoe UI',Tahoma,Arial,sans-serif; }
    .empRow, .empName, .empStatus { direction:ltr !important; unicode-bidi:embed; text-align:left !important; }

    /* رسالة الترحيب */
    .welcomeMsg {
      position:absolute; top:14px; left:16px; z-index:10;
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.25);
      border-radius:20px; padding:4px 10px;
      color:#fff; font-size:11px; font-weight:700;
      display:none; align-items:center; gap:5px;
      max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      cursor:pointer; transition:all .25s;
    }
    .welcomeMsg:hover { background:rgba(255,255,255,.28); }
    .welcomeMsg.visible { display:flex; }

    /* Date Picker Wrapper */
    .datePickerWrapper {
      position:relative;
      display:inline-block;
      margin-top:14px;
      z-index:20;
      min-height:44px;
      min-width:min(100%, 220px);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    .header .dateTag {
      display:inline-block;
      background:rgba(255,255,255,.18);
      padding:5px 18px;
      border-radius:10px;
      font-size:13px;
      font-weight:600;
      letter-spacing:.3px;
      cursor:pointer;
      transition:all .3s;
      border:2px solid rgba(255,255,255,.2);
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      -webkit-user-select:none;
      direction:ltr;
    }
    .header .dateTag:hover {
      background:rgba(255,255,255,.25);
      transform:translateY(-1px);
    }
    /* Transparent date input over #dateTag — native picker on iOS */
    .datePickerWrapper #datePicker {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      min-height:44px;
      margin:0;
      padding:0;
      opacity:0;
      cursor:pointer;
      font-size:16px;
      line-height:44px;
      border:none;
      z-index:2;
      color:transparent;
      background:transparent;
      touch-action:manipulation;
    }

    a.summaryChip, button.summaryChip, .langToggle, .roster-cta-btn, button.shiftFilterBtn {
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .header .dateTag {
      pointer-events: none;
    }


    /* ═══════ SUMMARY BAR ═══════ */
    .summaryBar { 
      display:flex; 
      justify-content:center; 
      align-items:stretch;
      gap:12px; 
      margin-top:14px;
      flex-wrap:wrap;
    }
    a.summaryChip:hover {
      transform:translateY(-3px);
      box-shadow:0 8px 20px rgba(15,23,42,.12);
    }
    a.summaryChip.gamesChip .chipVal { color:#7c3aed; }
    a.summaryChip.gamesChip:hover { box-shadow:0 8px 20px rgba(124,58,237,.18); }
    .summaryChip {
      background:#fff;
      border:1px solid rgba(15,23,42,.1);
      border-radius:14px;
      padding:10px 12px;
      text-align:center;
      box-shadow:0 2px 8px rgba(15,23,42,.06);
      transition:all .25s ease;
      min-width:72px;
    }
.roster-icon, .chipIcon {
      display: block;
      object-fit: contain;
      flex-shrink: 0;
    }
.summaryChip .chipVal { font-size:22px; font-weight:900; color:#1e40af; }
    .summaryChip .chipLabel { 
      font-size:9.5px;
      font-weight:600; 
      color:#64748b; 
      text-transform:uppercase; 
      letter-spacing:.4px; 
      margin-top:2px;
      white-space:nowrap;
    }

    /* ═══════ SHIFT FILTER BUTTONS AS CHIPS ═══════ */
    button.summaryChip.shiftFilterBtn {
      border:2px solid transparent;
      position:relative;
      overflow:hidden;
      padding:10px 14px; /* padding أصغر للأزرار */
    }
    button.summaryChip.shiftFilterBtn:hover {
      transform:translateY(-3px);
      box-shadow:0 8px 20px rgba(15,23,42,.12);
    }
    button.summaryChip.shiftFilterBtn.active {
      border-color:currentColor;
      box-shadow:0 6px 16px rgba(15,23,42,.18);
    }
    button.summaryChip.shiftFilterBtn.active::before {
      content:'';
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      background:currentColor;
      opacity:.06;
    }
    
    /* ألوان الورديات */
    button.shiftFilterBtn.morning {
      color:#f59e0b;
    }
    button.shiftFilterBtn.morning .chipVal { color:#f59e0b; }
    button.shiftFilterBtn.morning .chipLabel { color:#92400e; }
    
    button.shiftFilterBtn.afternoon {
      color:#f97316;
    }
    button.shiftFilterBtn.afternoon .chipVal { color:#f97316; }
    button.shiftFilterBtn.afternoon .chipLabel { color:#9a3412; }
    
    button.shiftFilterBtn.night {
      color:#8b5cf6;
    }
    button.shiftFilterBtn.night .chipVal { color:#8b5cf6; }
    button.shiftFilterBtn.night .chipLabel { color:#5b21b6; }
    
    button.shiftFilterBtn.all {
      color:#1e40af;
    }
    button.shiftFilterBtn.all .chipVal { color:#1e40af; }
    button.shiftFilterBtn.all .chipLabel { color:#1e40af; }
    
    /* للشاشات المتوسطة */
    @media (max-width:900px){
      .summaryBar { flex-wrap:wrap; } /* السماح بالانتقال للصف الثاني */
    }
    
    /* للموبايل */
    @media (max-width:600px){
      .summaryBar { gap:6px; }
      .summaryChip { padding:8px 8px; min-width:60px; }
      .summaryChip .chipVal .chip-icon {
      display: block;
      width: 22px;
      height: 22px;
      margin: 0 auto;
      flex-shrink: 0;
    }
    .summaryChip .chipVal .waveHand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }
    .summaryChip .chipVal .waveHand .chip-icon {
      margin: 0;
    }
    .summaryChip .chipVal { font-size:18px; }
      .summaryChip .chipLabel { font-size:8.5px; letter-spacing:.2px; }
    }


    /* ═══════ DEPARTMENT CARD ═══════ */
    .deptCard {
      margin-top:18px;
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(15,23,42,.07);
      box-shadow:0 4px 18px rgba(15,23,42,.08);
    }
    .deptHead {
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      background:#fff;
    }
    .deptIcon {
      width:40px; height:40px;
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .deptTitle { font-size:18px; font-weight:800; color:#1e293b; flex:1; letter-spacing:-.2px; }
    .deptBadge { min-width:48px; padding:6px 10px; border-radius:12px; text-align:center; }

    /* ═══════ SHIFT STACK ═══════ */
    .shiftStack { padding:10px; display:flex; flex-direction:column; gap:8px; }

    /* ═══════ SHIFT CARD — <details> ═══════ */
    .shiftCard {
      border-radius:14px;
      overflow:hidden;
    }

    .shiftSummary {
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 14px;
      cursor:pointer;
      list-style:none;
      -webkit-appearance:none;
      appearance:none;
      user-select:none;
    }
    .shiftSummary::-webkit-details-marker { display:none; }
    .shiftSummary::marker              { display:none; }

    .shiftIcon  { font-size:20px; line-height:1; flex-shrink:0; }
    .shiftLabel { font-size:15px; font-weight:800; flex:1; letter-spacing:-.1px; }
    .shiftCount {
      font-size:13px; font-weight:800;
      padding:3px 10px; border-radius:20px;
      flex-shrink:0;
    }

    /* chevron يدور لما يفتح */
    .shiftSummary::after {
      content:'▾';
      font-size:14px;
      color:#94a3b8;
      transition:transform .2s;
      flex-shrink:0;
    }
    .shiftCard[open] .shiftSummary::after {
      transform:rotate(180deg);
    }

    .shiftBody { background:rgba(255,255,255,.7); }

    /* ── employee row ── */
    .empRow {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:9px 16px;
      border-top:1px solid rgba(15,23,42,.06);
    }
    .empRowAlt { background:rgba(15,23,42,.02); }
    .empName  { font-size:15px; font-weight:700; color:#1e293b; }
    .empStatus { font-size:13px; font-weight:600; }

    /* ═══════ QUICK ACTIONS ═══════ */
    .quickActions.roster-cta {
      --cta-font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --cta-gap: 10px;
      margin-top: 22px;
      padding: 0 2px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--cta-gap);
      width: 100%;
      max-width: 100%;
      margin-inline: auto;
    }
    .roster-cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1.5px solid transparent;
      font-family: var(--cta-font);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    button.roster-cta-btn {
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
    }
    .roster-cta-icon {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      line-height: 0;
    }
    .roster-cta-icon svg { display: block; width: 18px; height: 18px; }
    .roster-cta-icon .roster-icon { width: 18px; height: 18px; }
    .roster-cta-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .roster-cta-btn--roster {
      background: #e8f1ff;
      border-color: #b8c9f5;
      color: #1e3a8a;
    }
    .roster-cta-btn--subscribe {
      background: #ffffff;
      border-color: #d4c4f7;
      color: #1f2937;
    }
    .roster-cta-btn--compare {
      background: #fffbeb;
      border-color: #fcd34d;
      color: #1f2937;
    }
    .roster-cta-btn--share {
      background: #ecfdf5;
      border-color: #86efac;
      color: #166534;
    }
    .roster-cta-btn--apps {
      background: #f0f9ff;
      border-color: #7dd3fc;
      color: #0369a1;
    }
    .roster-cta-btn--muted {
      background: #f1f5f9;
      border-color: #cbd5e1;
      color: #475569;
    }
    .roster-cta--import {
      grid-template-columns: 1fr 1fr;
    }
    .quickActions.roster-cta:not(.roster-cta--import) {
      grid-template-columns: repeat(6, 1fr);
    }
    .quickActions.roster-cta:not(.roster-cta--import) > .roster-cta-btn:nth-child(1) {
      grid-column: 1 / span 2;
    }
    .quickActions.roster-cta:not(.roster-cta--import) > .roster-cta-btn:nth-child(2) {
      grid-column: 3 / span 2;
    }
    .quickActions.roster-cta:not(.roster-cta--import) > .roster-cta-btn:nth-child(3) {
      grid-column: 5 / span 2;
    }
    .quickActions.roster-cta:not(.roster-cta--import) > .roster-cta-btn--share {
      grid-column: 2 / span 2;
    }
    .quickActions.roster-cta:not(.roster-cta--import) > .roster-cta-btn--apps {
      grid-column: 4 / span 2;
    }
    @media (hover: hover) {
      .roster-cta-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      }
      .roster-cta-btn--roster:hover { background: #dce8ff; }
      .roster-cta-btn--subscribe:hover { background: #faf5ff; }
      .roster-cta-btn--compare:hover { background: #fef3c7; }
      .roster-cta-btn--share:hover { background: #d1fae5; }
      .roster-cta-btn--apps:hover { background: #e0f2fe; }
      .roster-cta-btn--muted:hover { background: #e2e8f0; }
    }
    .roster-cta-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: none;
    }
    .roster-cta-btn:focus-visible {
      outline: 2px solid rgba(37, 99, 235, 0.45);
      outline-offset: 2px;
    }
    @media (max-width: 380px) {
      .roster-cta-btn {
        padding: 9px 8px;
        font-size: 11px;
        gap: 5px;
        min-height: 40px;
      }
      .roster-cta-icon { width: 16px; height: 16px; }
      .roster-cta-icon svg { width: 16px; height: 16px; }
      .roster-cta-icon .roster-icon { width: 16px; height: 16px; }
    }
    /* ═══════ SITE SHARE MODAL ═══════ */
    .siteShareSheet {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      z-index: 10001;
      padding: 16px;
      pointer-events: none;
      visibility: hidden;
    }
    .siteShareSheet.open {
      display: flex;
      pointer-events: auto;
      visibility: visible;
    }
    .siteShareCard {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 18px;
      padding: 18px 16px 14px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.22);
      text-align: center;
    }
    .siteShareTitle {
      font-size: 17px;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 4px;
    }
    .siteShareHint {
      font-size: 12px;
      color: #64748b;
      margin: 0 0 14px;
      line-height: 1.4;
    }
    .siteShareQr {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      margin: 0 auto 12px;
      background: #f8fafc;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 10px;
    }
    .siteShareUrl {
      font-size: 11px;
      color: #475569;
      word-break: break-all;
      line-height: 1.45;
      margin: 0 0 14px;
      padding: 8px 10px;
      background: #f1f5f9;
      border-radius: 10px;
    }
    .siteShareActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .siteShareActions .roster-cta-btn--compare {
      grid-column: 1 / -1;
    }
    .siteShareCloseWrap {
      margin-top: 4px;
    }
    .siteShareCloseWrap .roster-cta-btn {
      width: 100%;
    }

    /* ═══════ RELATED APPS MODAL ═══════ */
    .siteAppsSheet {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      z-index: 10002;
      padding: 16px;
      pointer-events: none;
      visibility: hidden;
    }
    .siteAppsSheet.open {
      display: flex;
      pointer-events: auto;
      visibility: visible;
    }
    .siteAppsCard {
      width: min(100%, 400px);
      max-height: min(92vh, 560px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-radius: 18px;
      padding: 18px 14px 14px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.22);
      text-align: center;
    }
    .siteAppsTitle {
      font-size: 17px;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 4px;
    }
    .siteAppsHint {
      font-size: 12px;
      color: #64748b;
      margin: 0 0 14px;
      line-height: 1.4;
    }
    .siteAppsGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      text-align: start;
    }
    .siteAppsLink {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 96px;
      padding: 12px 10px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      text-decoration: none;
      color: #0f172a;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .siteAppsLink:active {
      transform: scale(0.98);
    }
    .siteAppsLink-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }
    .siteAppsLink-icon svg {
      display: block;
    }
    .siteAppsLink-title {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
      text-align: center;
      color: #0f172a;
    }
    .siteAppsLink-sub {
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      line-height: 1.3;
      text-align: center;
    }
    .siteAppsLink--flights .siteAppsLink-icon { background: #e0f2fe; border-color: #bae6fd; }
    .siteAppsLink--labels .siteAppsLink-icon { background: #ecfdf5; border-color: #a7f3d0; }
    .siteAppsLink--calc .siteAppsLink-icon { background: #fffbeb; border-color: #fde68a; }
    .siteAppsLink--quicklist .siteAppsLink-icon { background: #f5f3ff; border-color: #ddd6fe; }
    .siteAppsLink--games {
      grid-column: 1 / -1;
      flex-direction: row;
      min-height: 72px;
      justify-content: flex-start;
      padding-inline: 14px;
      gap: 12px;
    }
    .siteAppsLink--games .siteAppsLink-icon {
      background: #fdf2f8;
      border-color: #fbcfe8;

<script>
(function(){
  var picker = document.getElementById('datePicker');
  if(!picker) return;
  window.openDatePicker = function() {
    if (!picker) return;
    try { picker.focus({ preventScroll: true }); } catch (e) { picker.focus(); }
    if (typeof picker.showPicker === 'function') {
      try { picker.showPicker(); return; } catch (e) {}
    }
    try { picker.click(); } catch (e2) {}
  };

  var dateWrap = document.querySelector('.datePickerWrapper');
  if (dateWrap) {
    dateWrap.addEventListener('click', function(e) {
      if (e.target === picker) return;
      openDatePicker();
    });
  }
  picker.addEventListener('click', function() {
    if (typeof picker.showPicker === 'function') {
      try { picker.showPicker(); } catch (e) {}
    }
  });

  
  var USER_DATE_NAV_KEY = 'rosterUserPickedDate';

  function getMuscatTodayIso() {
    var now = new Date();
    var muscatTime = new Date(now.getTime() + (4 * 60 * 60 * 1000) + (now.getTimezoneOffset() * 60 * 1000));
    return muscatTime.getFullYear() + '-' +
      String(muscatTime.getMonth() + 1).padStart(2, '0') + '-' +
      String(muscatTime.getDate()).padStart(2, '0');
  }

  function consumeUserDateNavigation() {
    if (sessionStorage.getItem(USER_DATE_NAV_KEY) !== '1') return false;
    sessionStorage.removeItem(USER_DATE_NAV_KEY);
    return true;
  }

  function markUserDateNavigation() {
    sessionStorage.setItem(USER_DATE_NAV_KEY, '1');
  }

  function buildDateBasePath() {
    var p = window.location.pathname || '/';
    return p
      .replace(/\/date\/\d{4}-\d{2}-\d{2}\/.*$/, '/')
      .replace(/\/now\/.*$/, '/')
      .replace(/\/+$/, '');
  }

  function redirectToDate(iso, isNowPage) {
    window.location.replace(buildDateBasePath() + '/date/' + iso + '/' + (isNowPage ? 'now/' : ''));
  }

  // ═══════════════════════════════════════════════════
  // التحقق من التاريخ وإعادة التوجيه للـ today
  // ═══════════════════════════════════════════════════
  function checkAndRedirectToToday() {
    var path = window.location.pathname || '/';
    var isNowPage = path.includes('/now');
    var todayIso = getMuscatTodayIso();

    if (!path.includes('/date/')) {
      var baseRoot = path.replace(/\/now\/?$/, '/').replace(/\/+$/, '');
      window.location.replace(baseRoot + '/date/' + todayIso + '/' + (isNowPage ? 'now/' : ''));
      return true;
    }

    var dateMatch = path.match(/\/date\/(\d{4})-(\d{2})-(\d{2})\//);
    if (!dateMatch) return false;

    var pageIso = dateMatch[1] + '-' + dateMatch[2] + '-' + dateMatch[3];
    if (pageIso === todayIso) {
      sessionStorage.removeItem(USER_DATE_NAV_KEY);
      sessionStorage.removeItem('pageLoaded');
      return false;
    }

    if (consumeUserDateNavigation()) return false;

    redirectToDate(todayIso, isNowPage);
    return true;
  }

  function resyncTodayIfNeeded() {
    var path = window.location.pathname || '/';
    if (!path.includes('/date/')) return;
    var dateMatch = path.match(/\/date\/(\d{4})-(\d{2})-(\d{2})\//);
    if (!dateMatch) return;
    var pageIso = dateMatch[1] + '-' + dateMatch[2] + '-' + dateMatch[3];
    var todayIso = getMuscatTodayIso();
    if (pageIso !== todayIso && sessionStorage.getItem(USER_DATE_NAV_KEY) !== '1') {
      redirectToDate(todayIso, path.includes('/now'));
    }
  }

  if (checkAndRedirectToToday()) return;

  window.addEventListener('pageshow', function(ev) {
    if (ev.persisted) resyncTodayIfNeeded();
  });
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') resyncTodayIfNeeded();
  });

  // ═══════════════════════════════════════════════════
  // عند تغيير التاريخ → انتقل للصفحة المناسبة
  // ═══════════════════════════════════════════════════
  picker.addEventListener('change', function() {
    if (!picker.value) return;


    markUserDateNavigation();
    sessionStorage.removeItem('pageLoaded');

    var path = window.location.pathname || '/';
    var isNowPage = path.includes('/now');
    var base = path
      .replace(/\/date\/\d{4}-\d{2}-\d{2}\/.*$/, '/')
      .replace(/\/now\/.*$/, '/')
      .replace(/\/+$/, '');

    var target = base + '/date/' + picker.value + '/';
    if (isNowPage) target += 'now/';

    window.location.href = target;
  });

})();

// ═══════════════════════════════════════════════════
// Shift Filter (NOW PAGE ONLY)
// ═══════════════════════════════════════════════════
(function(){
  var filterBtns = document.querySelectorAll('.shiftFilterBtn');
  if(!filterBtns.length) return; // Not a /now/ page
  
  var allShiftCards = document.querySelectorAll('.shiftCard');
  
  // Group shift cards by shift type
  var shiftGroups = {};
  allShiftCards.forEach(function(card){
    var shiftType = card.dataset.shift;
    if(!shiftType) return;
    if(!shiftGroups[shiftType]) shiftGroups[shiftType] = [];
    shiftGroups[shiftType].push(card);
  });
  
  // Determine current shift based on time
  function getCurrentShift(){
    var now = new Date();
    var muscatTime = new Date(now.getTime() + (4 * 60 * 60 * 1000) + (now.getTimezoneOffset() * 60 * 1000));
    var hour = muscatTime.getHours();
    var minute = muscatTime.getMinutes();
    var t = hour * 60 + minute;
    
    if(t >= 21 * 60 || t < 5 * 60) return 'Night';
    if(t >= 13 * 60) return 'Afternoon';
    return 'Morning';
  }
  
  // Set active shift on load - default to current shift
  var currentShift = getCurrentShift();
  filterBtns.forEach(function(btn){
    if(btn.dataset.shift === currentShift){
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  
  // Filter function
  function filterShifts(selectedShift){
    var totalEmployees = 0;
    
    if(selectedShift === 'All'){
      // Show all shifts
      allShiftCards.forEach(function(card){
        card.style.display = '';
        var count = card.querySelector('.shiftCount');
        if(count) totalEmployees += parseInt(count.textContent) || 0;
      });
    } else {
      // Hide all cards first
      allShiftCards.forEach(function(card){ card.style.display = 'none'; });
      
      // Show only selected shift cards and count employees
      if(shiftGroups[selectedShift]){
        shiftGroups[selectedShift].forEach(function(card){
          card.style.display = '';
          // Auto-open the selected shift
          card.setAttribute('open', '');
          // Count employees in this card
          var count = card.querySelector('.shiftCount');
          if(count) totalEmployees += parseInt(count.textContent) || 0;
        });
      }
      
      // Also show Off Day, Leave, Training, Standby in all shifts
      var alwaysShow = ['Off Day', 'Annual Leave', 'Sick Leave', 'Training', 'Standby', 'Other'];
      alwaysShow.forEach(function(type){
        if(shiftGroups[type]){
          shiftGroups[type].forEach(function(card){
            card.style.display = '';
            // لا تحسب Off Day/Leave في عداد الفترة المختارة
          });
        }
      });
    }
    
    // Update employee count in summary
    var employeeChip = document.querySelector('.summaryChip .chipVal');
    if(employeeChip){
      employeeChip.textContent = totalEmployees;
    }
    
    // Update button states
    filterBtns.forEach(function(btn){
      if(btn.dataset.shift === selectedShift){
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }
  
  // Add click handlers
  filterBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      filterShifts(this.dataset.shift);
    });
  });
  
  // Auto-filter on page load - show current shift
  filterShifts(currentShift);
})();

// ══════════════════════════════════════════════════
// Language Toggle
// ══════════════════════════════════════════════════
var LANG = localStorage.getItem('rosterLang') || 'en';
var T = {
  en: {
    title:'📋 Duty Roster', langBtn:'ع',
    employees:'Emp.', departments:'Depts.', total:'Total',
    morning:'Morning', afternoon:'Afternoon', night:'Night',
    offday:'Off Day', annualLeave:'Annual Leave', sickLeave:'Sick Leave',
    training:'Training', standby:'Standby', other:'Other',
    from:'FROM', to:'TO',
    viewFull:'📋 View Full Duty Roster', subscribe:'Subscribe',
    officers:'Officers', supervisors:'Supervisors', loadControl:'Load Control',
    exportChecker:'Export Checker', exportOps:'Export Operators', unassigned:'Unassigned',
    morning2:'Morning', afternoon2:'Afternoon', night2:'Night', allShifts:'All Shifts', mySchedule:'Schedule', games:'Games',
  },
  ar: {
    title:'📋 جدول المناوبات', langBtn:'EN',
    employees:'الموظفون', departments:'الأقسام', total:'المجموع',
    morning:'صباح', afternoon:'ظهر', night:'ليل',
    offday:'إجازة', annualLeave:'إجازة سنوية', sickLeave:'إجازة مرضية',
    training:'تدريب', standby:'احتياط', other:'أخرى',
    from:'من', to:'إلى',
    viewFull:'📋 عرض جدول المناوبات الكامل', subscribe:'اشتراك',
    officers:'الضباط', supervisors:'المشرفون', loadControl:'مراقبة الحمولة',
    exportChecker:'مدقق الصادرات', exportOps:'مشغلو الصادرات', unassigned:'غير مُعيَّن',
    morning2:'صباح', afternoon2:'ظهر', night2:'ليل', allShifts:'الكل', mySchedule:'جدولي', games:'الألعاب',
  }
};

function applyLang(lang) {
  var t=T[lang], isAr=lang==='ar';
  document.body.classList.toggle('ar',isAr);
  document.documentElement.setAttribute('lang',lang);
  var el=document.getElementById('pageTitle'); if(el) el.textContent=t.title;
  var langLbl=document.getElementById('langToggleLabel');
  if(langLbl) langLbl.textContent=t.langBtn;
  else {{ var btn=document.getElementById('langToggle'); if(btn) btn.textContent=t.langBtn; }}
  document.querySelectorAll('.chipLabel').forEach(function(el) {
    var k=el.dataset.key;
    if(k==='employees') el.textContent=t.employees;
    else if(k==='departments') el.textContent=t.departments;
    else if(k==='morning') el.textContent=t.morning2;
    else if(k==='afternoon') el.textContent=t.afternoon2;
    else if(k==='night') el.textContent=t.night2;
    else if(k==='allShifts') el.textContent=t.allShifts;
    else if(k==='mySchedule') el.textContent=t.mySchedule;
  });
  document.querySelectorAll('.deptBadge span:first-child').forEach(function(el) { el.textContent=t.total; });
  var deptMap={'Officers':t.officers,'Supervisors':t.supervisors,'Load Control':t.loadControl,
    'Export Checker':t.exportChecker,'Export Operators':t.exportOps,'Unassigned':t.unassigned};
  document.querySelectorAll('.deptTitle').forEach(function(el) {
    if(!el.dataset.key) el.dataset.key=el.textContent.trim();
    if(deptMap[el.dataset.key]) el.textContent=deptMap[el.dataset.key];
  });
  var shiftMap={'Morning':t.morning,'Afternoon':t.afternoon,'Night':t.night,
    'Off Day':t.offday,'Annual Leave':t.annualLeave,'Sick Leave':t.sickLeave,
    'Training':t.training,'Standby':t.standby,'Other':t.other};
  document.querySelectorAll('.shiftLabel').forEach(function(el) {
    if(!el.dataset.key) el.dataset.key=el.textContent.trim();
    if(shiftMap[el.dataset.key]) el.textContent=shiftMap[el.dataset.key];
  });
  document.querySelectorAll('.empStatus span').forEach(function(el) {
    var txt=el.textContent.trim();
    if(txt==='FROM'||txt==='من') el.textContent=t.from;
    if(txt==='TO'||txt==='إلى') el.textContent=t.to;
  });
  function setCtaLabel(id, text) {
    var el = document.getElementById(id);
    if (!el) return;
    var lbl = el.querySelector('.roster-cta-label');
    if (lbl) lbl.textContent = text;
    else el.textContent = text;
  }
  setCtaLabel('ctaBtn', t.viewFull);
  setCtaLabel('subscribeBtn', t.subscribe);
  setCtaLabel('compareBtn', t.compare);
  setCtaLabel('shareSiteBtn', t.shareSite);
var footer=document.querySelector('.footer');
  if(footer) {
    var h=footer.innerHTML;
    if(isAr) {
      h=h.replace('Last Updated','آخر تحديث'); h=h.replace('Source:','المصدر:');
    } else {
      h=h.replace('آخر تحديث','Last Updated'); h=h.replace('المصدر:','Source:');
    }
    footer.innerHTML=h;
  }
  localStorage.setItem('rosterLang',lang);
  LANG=lang;
}
function toggleLang() { applyLang(LANG==='en'?'ar':'en'); }
applyLang(LANG);

// ═══════════════════════════════════════════════════
// رسالة الترحيب — تقرأ اسم الموظف من schedules JSON
// ═══════════════════════════════════════════════════
(function() {
  var empId = localStorage.getItem('savedEmpId');
  if (!empId) return;
  // استخدام مسار مطلق يعمل من أي صفحة
  var base = getSiteRootUrl() + '/';
  fetch(base + 'schedules/' + empId + '.json')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) {
      if (!d || !d.name) return;
      var firstName = d.name.split(' ')[0];
      var msg = document.getElementById('welcomeMsg');
      if (msg) {
        msg.textContent = '👋 ' + firstName;
        msg.classList.add('visible');
      }
    }).catch(function() {});
})();

function goToMySchedule() {
  var id = localStorage.getItem('savedEmpId');
  var base = getSiteRootUrl() + '/my-schedules/index.html';
  location.href = id ? base + '?emp=' + encodeURIComponent(id) : base;
}
</script>
