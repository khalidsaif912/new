name: Import Roster Site

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build_import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if Excel file changed
        id: check_changes
        env:
          IMPORT_SOURCE_NAME_URL: ${{ secrets.IMPORT_SOURCE_NAME_URL }}
        run: |
          python << 'EOF'
          import os
          import sys
          import hashlib
          import requests
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          url = os.getenv("IMPORT_SOURCE_NAME_URL")

          if not url:
              print("ERROR: IMPORT_SOURCE_NAME_URL secret is missing")
              sys.exit(1)

          print("Downloading Excel file...")

          response = requests.get(url, timeout=30)
          response.raise_for_status()

          file_bytes = response.content

          if not file_bytes:
              print("ERROR: Downloaded Excel file is empty")
              sys.exit(1)

          current_hash = hashlib.sha256(file_bytes).hexdigest()

          cache_file = Path("import_last_hash.txt")
          old_hash = "none"
          changed = True

          if cache_file.exists():
              old_hash = cache_file.read_text(encoding="utf-8").strip()
              if old_hash == current_hash:
                  changed = False

          cache_file.write_text(current_hash, encoding="utf-8")

          muscat = timezone(timedelta(hours=4))
          now = datetime.now(muscat)

          mandatory_hours = [0, 5, 6, 13, 14, 20, 21]
          mandatory_update = now.hour in mandatory_hours

          should_process = changed or mandatory_update

          print(f"Muscat time: {now.strftime('%H:%M')}")
          print(f"File changed: {changed}")
          print(f"Mandatory update: {mandatory_update}")
          print(f"Should process: {should_process}")
          print(f"Current hash: {current_hash[:12]}")
          print(f"Old hash: {old_hash[:12] if old_hash != 'none' else 'none'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changed={str(changed).lower()}\n")
              f.write(f"should_process={str(should_process).lower()}\n")
              f.write(f"current_hash={current_hash[:12]}\n")
              f.write(f"old_hash={old_hash[:12] if old_hash != 'none' else 'none'}\n")
          EOF

      - name: Display check info
        run: |
          echo "========================================"
          echo "Import Check Report"
          echo "========================================"
          echo "File changed:   ${{ steps.check_changes.outputs.changed }}"
          echo "Should process: ${{ steps.check_changes.outputs.should_process }}"
          echo "Current hash:   ${{ steps.check_changes.outputs.current_hash }}"
          echo "Previous hash:  ${{ steps.check_changes.outputs.old_hash }}"
          echo "========================================"

      - name: Generate Import pages and send mail
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          IMPORT_SOURCE_NAME_URL: ${{ secrets.IMPORT_SOURCE_NAME_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: |
          echo "Generating import pages..."
          python generate_and_send_import.py
          echo "Done!"

      - name: Commit updated Import docs
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/import import_last_hash.txt

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
              git commit -m "Update IMPORT roster"
            else
              git commit -m "Scheduled IMPORT update"
            fi

            git pull --rebase
            git push
            echo "Pushed!"
          fi

      - name: Skip - No action needed
        if: steps.check_changes.outputs.should_process == 'false'
        run: |
          echo "========================================"
          echo "No action needed"
          echo "========================================"
