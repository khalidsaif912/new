name: Import Roster Site

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build_import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if file changed
        id: check_changes
        env:
          IMPORT_SOURCE_NAME_URL: ${{ secrets.IMPORT_SOURCE_NAME_URL }}
        run: |
          python << 'EOF'
          import os, requests, sys
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          url = os.getenv("IMPORT_SOURCE_NAME_URL")

          if not url:
              print("Missing IMPORT_SOURCE_NAME_URL")
              sys.exit(1)

          print(f"Checking: {url}")

          r = requests.get(url, timeout=15)
          r.raise_for_status()

          # هنا لازم يكون نص فقط
          current_name = r.text.strip()

          if not current_name:
              print("Empty response")
              sys.exit(1)

          print(f"Current file: {current_name}")

          cache = Path("last_name.txt")
          old_name = "none"
          changed = True

          if cache.exists():
              old_name = cache.read_text().strip()
              if old_name == current_name:
                  changed = False

          cache.write_text(current_name)

          # توقيت مسقط
          muscat = timezone(timedelta(hours=4))
          now = datetime.now(muscat)

          mandatory_hours = [0, 5, 6, 13, 14, 20, 21]
          force = now.hour in mandatory_hours

          should = changed or force

          print(f"Muscat time: {now.strftime('%H:%M')}")
          print(f"Changed: {changed}")
          print(f"Force: {force}")
          print(f"Should run: {should}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={str(changed).lower()}\n")
              f.write(f"should_process={str(should).lower()}\n")
              f.write(f"name={current_name}\n")
              f.write(f"old={old_name}\n")
          EOF

      - name: Show info
        run: |
          echo "Changed: ${{ steps.check_changes.outputs.changed }}"
          echo "Should: ${{ steps.check_changes.outputs.should_process }}"
          echo "Name:   ${{ steps.check_changes.outputs.name }}"

      - name: Run script
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          IMPORT_SOURCE_NAME_URL: ${{ secrets.IMPORT_SOURCE_NAME_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: |
          python generate_and_send_import.py

      - name: Commit
        if: steps.check_changes.outputs.should_process == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/import last_name.txt

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update import"
            git pull --rebase
            git push
          fi

      - name: Skip
        if: steps.check_changes.outputs.should_process == 'false'
        run: echo "No action needed"
