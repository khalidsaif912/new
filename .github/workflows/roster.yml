name: Roster Site + Email
on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect export roster changes (name + Excel hash)
        id: check_changes
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          EXPORT_SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
          EXPORT_EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
        run: python scripts/ci_roster_change_gate.py export

      - name: Display change info
        run: |
          echo "========================================"
          echo "Check Report:"
          echo "========================================"
          echo "Name changed:      ${{ steps.check_changes.outputs.name_changed }}"
          echo "Content changed:   ${{ steps.check_changes.outputs.content_changed }}"
          echo "Should process:    ${{ steps.check_changes.outputs.should_process }}"
          echo "Should send email: ${{ steps.check_changes.outputs.should_send_email }}"
          echo "Current file:      ${{ steps.check_changes.outputs.filename }}"
          echo "Previous file:     ${{ steps.check_changes.outputs.old_filename }}"
          echo "Month key:         ${{ steps.check_changes.outputs.month_key }}"
          echo "========================================"

      - name: Stage export roster baseline for auto-diff
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          ROSTER_FILENAME: ${{ steps.check_changes.outputs.filename }}
        run: python scripts/ci_export_diff_snapshots.py before

      - name: Generate page + send email
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
          SOURCE_NAME_URL: ${{ secrets.EXPORT_SOURCE_NAME_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          SUBSCRIBE_TOKEN: ${{ secrets.SUBSCRIBE_TOKEN }}
        run: |
          EXTRA=""
          if [ "${{ steps.check_changes.outputs.should_send_email }}" != "true" ]; then
            EXTRA="--no-email"
          fi
          if [ "${{ steps.check_changes.outputs.name_changed }}" == "true" ] || [ "${{ steps.check_changes.outputs.content_changed }}" == "true" ]; then
            echo "Processing (remote change): ${{ steps.check_changes.outputs.filename }}"
          else
            echo "Processing (manual refresh): ${{ steps.check_changes.outputs.filename }}"
          fi
          python generate_and_send.py $EXTRA
          echo "Done!"

      - name: Generate employee schedules
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
          EXPORT_EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
          ROSTER_FILENAME: ${{ steps.check_changes.outputs.filename }}
        run: |
          if [ -f "generate_employee_schedules.py" ]; then
            echo "Generating employee schedules..."
            python generate_employee_schedules.py --filename "$ROSTER_FILENAME"
            echo "Done!"
          else
            echo "generate_employee_schedules.py not found, skipping..."
          fi

      - name: Build export roster auto-diff (same month, previous vs current file)
        if: steps.check_changes.outputs.should_process == 'true'
        env:
          ROSTER_FILENAME: ${{ steps.check_changes.outputs.filename }}
        run: python scripts/ci_export_diff_snapshots.py after

      - name: Prefetch absence file to local path
        id: prefetch_absence
        if: success()
        env:
          ABSENCE_EXCEL_URL: ${{ secrets.ABSENCE_EXCEL_URL }}
        run: |
          python << 'EOF'
          import os
          import sys
          from pathlib import Path
          from roster_app.cache_io import download_excel

          url = (os.getenv("ABSENCE_EXCEL_URL") or "").strip()
          if not url:
              print("ABSENCE_EXCEL_URL is empty; skipping prefetch.")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write("absence_ready=false\n")
              sys.exit(0)

          out_path = Path("tmp") / "absence-report.xlsb"
          out_path.parent.mkdir(parents=True, exist_ok=True)
          print(f"Prefetching absence report from: {url[:80]}...")
          try:
              data = download_excel(url)
              out_path.write_bytes(data)
              print(f"Saved local absence file: {out_path} ({len(data):,} bytes)")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write("absence_ready=true\n")
          except Exception as e:
              print(f"::warning::Absence prefetch failed, skipping absence processing in this run: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write("absence_ready=false\n")
          EOF

      - name: Process absence report
        if: success() && steps.prefetch_absence.outputs.absence_ready == 'true'
        env:
          ABSENCE_EXCEL_URL: ${{ secrets.ABSENCE_EXCEL_URL }}
          ABSENCE_EXCEL_FILE: tmp/absence-report.xlsb
        run: python process_absence.py

      - name: Skip absence report (unavailable)
        if: success() && steps.prefetch_absence.outputs.absence_ready != 'true'
        run: echo "Absence file unavailable from SharePoint in this run; skipping absence processing."

      - name: Commit updated docs
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs rosters last_filename.txt
          if [ -f last_absence_hash.txt ]; then git add last_absence_hash.txt; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ steps.check_changes.outputs.should_process }}" == "true" ]; then
              if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
                git commit -m "Update roster: ${{ steps.check_changes.outputs.filename }}"
              else
                git commit -m "Refresh export roster pages"
              fi
            else
              git commit -m "Update absence data"
            fi
            git push
            echo "Pushed!"
          fi

      - name: Skip - No action needed
        if: steps.check_changes.outputs.should_process == 'false'
        run: |
          echo "========================================"
          echo "No export changes detected (name + hash)"
          echo "Current file: ${{ steps.check_changes.outputs.filename }}"
          echo "========================================"
