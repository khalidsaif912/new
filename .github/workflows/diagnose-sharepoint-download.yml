name: Diagnose SharePoint Download Behavior

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Probe export and absence links
        env:
          EXPORT_EXCEL_URL: ${{ secrets.EXPORT_EXCEL_URL || secrets.EXCEL_URL }}
          ABSENCE_EXCEL_URL: ${{ secrets.ABSENCE_EXCEL_URL }}
        run: python scripts/probe_share_links.py

      - name: Upload probe report
        uses: actions/upload-artifact@v4
        with:
          name: sharepoint-probe-report
          path: sharepoint_probe_report.json
