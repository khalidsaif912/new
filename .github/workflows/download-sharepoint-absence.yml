name: Download SharePoint Absence File

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  download-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process absence report (SharePoint with archive fallback)
        env:
          ABSENCE_EXCEL_URL: ${{ secrets.ABSENCE_EXCEL_URL }}
          ABSENCE_EXCEL_FILE: ""
        run: |
          if [ -z "${ABSENCE_EXCEL_URL}" ]; then
            echo "::error::Missing secret ABSENCE_EXCEL_URL"
            exit 1
          fi
          python process_absence.py

      - name: Commit and push absence updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/absence-data.json last_absence_hash.txt absence-archive
          if git diff --staged --quiet; then
            echo "No absence changes to commit"
          else
            git commit -m "Update absence data"
            git push
          fi

      - name: Upload downloaded absence file
        uses: actions/upload-artifact@v4
        with:
          name: absence-source-file
          path: absence-archive/latest.xlsb
          if-no-files-found: ignore

      - name: Upload generated absence JSON
        uses: actions/upload-artifact@v4
        with:
          name: absence-data-json
          path: docs/absence-data.json
