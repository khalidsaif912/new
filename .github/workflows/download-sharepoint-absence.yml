name: Download SharePoint Absence File

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  download-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process absence report (SharePoint with archive fallback)
        id: process_absence
        env:
          ABSENCE_EXCEL_URL: ${{ secrets.ABSENCE_EXCEL_URL }}
          ABSENCE_EXCEL_FILE: ""
        run: |
          if [ -z "${ABSENCE_EXCEL_URL}" ]; then
            echo "::error::Missing secret ABSENCE_EXCEL_URL"
            exit 1
          fi
          if python process_absence.py; then
            echo "process_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "process_status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when SharePoint download is blocked
        if: steps.process_absence.outputs.process_status == 'failed'
        run: |
          echo "::warning::Absence processing failed because SharePoint returned non-Excel payload (preview/auth wall)."
          echo "::warning::No new absence data was generated in this run."

      - name: Commit and push absence updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if [ -f "docs/absence-data.json" ]; then git add docs/absence-data.json; fi
          if [ -f "last_absence_hash.txt" ]; then git add last_absence_hash.txt; fi
          if [ -d "absence-archive" ]; then git add absence-archive; fi
          if git diff --staged --quiet; then
            echo "No absence changes to commit"
          else
            git commit -m "Update absence data"
            git push
          fi

      - name: Upload downloaded absence file
        if: hashFiles('absence-archive/absence-report.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: absence-source-file
          path: absence-archive/absence-report.xlsx

      - name: Upload SharePoint debug payload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sharepoint-debug-response
          path: debug_sharepoint_response.png
          if-no-files-found: ignore

      - name: Upload generated absence JSON
        uses: actions/upload-artifact@v4
        with:
          name: absence-data-json
          path: docs/absence-data.json
